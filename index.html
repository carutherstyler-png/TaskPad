<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Figtree','Segoe UI',sans-serif;background:#f5f6f8;min-height:100vh;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:0.4;cursor:pointer;}
@keyframes rowIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes flash{0%{background:#e6f7ff}100%{background:transparent}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes swipeHint{0%{transform:translateX(0)}50%{transform:translateX(-8px)}100%{transform:translateX(0)}}
.row-anim{animation:rowIn 0.18s ease both;}
.row-flash{animation:flash 0.6s ease;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323338;color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:toastIn 0.3s ease;z-index:99998;white-space:nowrap;}
.floating-menu{position:fixed;z-index:99999;background:#fff;border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,0.18);border:1px solid #e6e9ef;overflow:hidden;}
.menu-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:#323338;transition:background 0.1s;white-space:nowrap;}
.menu-item:hover{background:#f5f6f8;}
.hdr{padding:10px 12px;font-size:11px;font-weight:700;color:#676879;letter-spacing:0.4px;text-transform:uppercase;border-right:1px solid #e6e9ef;background:#f5f6f8;user-select:none;text-align:left;white-space:nowrap;}
.hdr.sortable{cursor:pointer;}
.hdr.sortable:hover{background:#edf0f4;color:#323338;}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;user-select:none;transition:opacity 0.1s;padding:3px 10px;font-size:12px;}
.pill:active{opacity:0.75;}
.pill.large{font-size:14px;padding:6px 13px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#00c875;display:inline-block;flex-shrink:0;}
.sync-dot.syncing{background:#fdab3d;animation:pulse 1s infinite;}
.del-btn{background:none;border:none;cursor:pointer;color:#c5c7d4;font-size:17px;padding:0 8px;transition:color 0.15s;line-height:1;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.del-btn:hover,.del-btn:active{color:#e2445c;}
.user-btn{border:none;border-radius:20px;padding:6px 12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
.add-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;cursor:pointer;color:#676879;font-size:13px;font-weight:500;background:none;border:none;font-family:inherit;transition:color 0.15s;}
.add-btn:hover{color:#0073ea;}
.mobile-card{background:#fff;border-radius:10px;border:1px solid #e6e9ef;padding:12px 14px;margin-bottom:8px;animation:rowIn 0.18s ease both;position:relative;overflow:hidden;transition:transform 0.2s;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.mobile-card.overdue{border-left:3px solid #e2445c;}
.mobile-card.done{opacity:0.55;}
.mobile-input-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e6e9ef;padding:10px 12px;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,0.1);flex-direction:column;gap:8px;}
.mobile-input-bar.open{display:flex;}
.bar-input{flex:1;border:1.5px solid #e6e9ef;border-radius:8px;padding:10px 14px;font-family:inherit;font-size:16px;color:#323338;outline:none;background:#f5f6f8;}.mobile-card input,.mobile-card textarea,.mobile-card select{-webkit-user-select:text;user-select:text;}
.bar-input:focus{border-color:#0073ea;background:#fff;}
.bar-add{background:#0073ea;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.bar-cancel{background:none;border:none;color:#c5c7d4;font-size:24px;cursor:pointer;padding:0 4px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.nav-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-family:inherit;font-size:13px;font-weight:600;color:#676879;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.nav-tab.active{color:#0073ea;border-bottom-color:#0073ea;}
.nav-tab:hover{color:#323338;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:#c5c7d4;gap:12px;}
.empty-state svg{opacity:0.4;}
.resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:10;}
.resize-handle:hover{background:rgba(0,115,234,0.2);}
@media(max-width:700px){
  .desktop-only{display:none !important;}
  .mobile-only{display:block !important;}
  .top-bar{padding:10px 12px !important;}
  .action-bar{padding:8px 12px 6px !important;}
  .groups-wrap{padding:0 0 90px !important;}
  .group-card{border-radius:0 !important;border-left:none !important;border-right:none !important;margin-bottom:8px !important;}
  .user-label{display:none;}
}
@media(min-width:701px){
  .desktop-only{display:block !important;}
  .mobile-only{display:none !important;}
}
.mobile-only{display:none;}
</style>
</head>

<script type="text/babel">

firebase.initializeApp(FIREBASE_CONFIG);

const STATUS_OPTIONS=[
  {label:"Not Started",color:"#c4c4c4",bg:"#f0f0f0"},
  {label:"In Progress",color:"#fdab3d",bg:"#fff5e6"},
  {label:"Stuck",color:"#e2445c",bg:"#fce8ec"},
  {label:"Done",color:"#00c875",bg:"#e6faf3"},
];
const PRIORITY_OPTIONS=[
  {label:"Critical",color:"#333333",bg:"#e8e8e8"},
  {label:"High",color:"#e2445c",bg:"#fce8ec"},
  {label:"Medium",color:"#fdab3d",bg:"#fff5e6"},
  {label:"Low",color:"#579bfc",bg:"#eaf2ff"},
];
const REC_UNITS=["Minutes","Hours","Days","Weeks","Months"];
const DUR_UNITS=["mins","hrs","days"];
const GROUPS=[
  {id:"home",label:"Home",color:"#0073ea"},
  {id:"ferry",label:"Ferry",color:"#9b59b6"},
];
const USERS=[
  {id:"tyler",label:"Tyler",color:"#0073ea",initials:"T"},
  {id:"melissa",label:"Melissa",color:"#e2445c",initials:"M"},
  {id:"both",label:"Both",color:"#00c875",initials:"TM"},
];

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function resolveUser(id){return USERS.find(u=>u.id===id)||USERS.find(u=>u.label===id)||USERS[2];}
function addDays(ds,d){const dt=new Date(ds);dt.setDate(dt.getDate()+d);return dt.toISOString().slice(0,10);}
function nextDue(due,num,unit){
  if(!due||!num||num==="0")return due;
  const n=parseInt(num)||1;
  const d=new Date(due);
  if(unit==="Days"){d.setDate(d.getDate()+n);}
  else if(unit==="Weeks"){d.setDate(d.getDate()+n*7);}
  else if(unit==="Months"){d.setMonth(d.getMonth()+n);}
  return d.toISOString().slice(0,10);
}
function formatRelDate(ds){
  if(!ds)return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(ds); d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/(1000*60*60*24));
  if(diff===0)return{label:"Today",color:"#e2445c"};
  if(diff===1)return{label:"Tomorrow",color:"#fdab3d"};
  if(diff===-1)return{label:"Yesterday",color:"#e2445c"};
  if(diff<0)return{label:`${Math.abs(diff)}d overdue`,color:"#e2445c"};
  if(diff<=7)return{label:`${diff}d`,color:"#fdab3d"};
  return{label:d.toLocaleDateString("en-US",{month:"short",day:"numeric"}),color:"#676879"};
}
function isOverdue(task){return task.dueDate&&new Date(task.dueDate)<new Date()&&task.status!=="Done";}
function priorityOrder(p){return{Critical:0,High:1,Medium:2,Low:3}[p]??99;}
function statusOrder(s){return{"Not Started":0,"In Progress":1,Stuck:2,Done:3}[s]??99;}
function durToMins(t){const n=parseFloat(t.durNum)||0;if(t.durUnit==="hrs")return n*60;if(t.durUnit==="days")return n*1440;return n;}
function recToDays(t){const n=parseFloat(t.recNum)||0;const u=t.recUnit||"Days";if(u==="Minutes")return n/1440;if(u==="Hours")return n/24;if(u==="Weeks")return n*7;if(u==="Months")return n*30;return n;}
function exportCSV(tasks){
  const headers=["Name","Status","Priority","Due Date","Duration","Recurrence","Group","Assignee","Notes"];
  const rows=tasks.map(t=>[t.name,t.status,t.priority,t.dueDate||"",t.durNum?`${t.durNum} ${t.durUnit}`:"",t.recNum?`${t.recNum} ${t.recUnit}`:"",t.group,resolveUser(t.assignee).label,t.notes||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
  const csv=[headers.join(","),...rows].join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="mytasks.csv";a.click();
}

async function saveTask(task){await db.collection("tasks").doc(task.id).set(task);}
async function deleteTaskDb(id){await db.collection("tasks").doc(id).delete();}
async function saveTasks(list){const b=db.batch();list.forEach(t=>b.set(db.collection("tasks").doc(t.id),t));await b.commit();}

// ── Global Popover ──
let _setGlobalPop=null;
function GlobalPopover(){
  const[pop,setPop]=useState(null);
  _setGlobalPop=setPop;
  const inputRef=useRef();
  const[num,setNum]=useState("");
  const[unit,setUnit]=useState("");
  useEffect(()=>{if(pop){setNum(pop.num&&pop.num!=="0"?pop.num:"");setUnit(pop.unit||pop.defaultUnit);setTimeout(()=>inputRef.current?.focus(),50);}},[ pop?.id]);
  useEffect(()=>{
    if(!pop)return;
    const h=e=>{const el=document.getElementById("gpop");if(el&&!el.contains(e.target)){pop.onSave(num,unit);setPop(null);}};
    document.addEventListener("mousedown",h);document.addEventListener("touchstart",h,{passive:true});
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};
  },[pop,num,unit]);
  if(!pop)return null;
  const hasVal=num&&num!=="0"&&num!=="";
  return(
    <div id="gpop" style={{position:"fixed",top:pop.top,left:pop.left,zIndex:999999,background:"#fff",borderRadius:8,boxShadow:"0 4px 24px rgba(0,0,0,0.16)",border:"1px solid #e6e9ef",padding:"10px 12px",display:"flex",gap:8,alignItems:"center"}}>
      <input ref={inputRef} type="number" min="0" placeholder="0" value={num} onChange={e=>setNum(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter"){pop.onSave(num,unit);setPop(null);}if(e.key==="Escape")setPop(null);}}
        style={{width:58,border:"1.5px solid #e6e9ef",borderRadius:6,padding:"6px 8px",fontFamily:"inherit",fontSize:14,color:"#323338",outline:"none",textAlign:"center"}}
        onFocus={e=>e.target.style.borderColor=pop.color} onBlur={e=>e.target.style.borderColor="#e6e9ef"}/>
      <select value={unit} onChange={e=>setUnit(e.target.value)}
        style={{border:"1.5px solid #e6e9ef",borderRadius:6,padding:"6px",fontFamily:"inherit",fontSize:13,color:"#323338",outline:"none",cursor:"pointer",background:"#fff"}}>
        {pop.units.map(u=><option key={u}>{u}</option>)}
      </select>
      <button onClick={e=>{e.stopPropagation();pop.onSave(num,unit);setPop(null);}}
        style={{background:pop.color,color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer"}}>✓</button>
      {hasVal&&<button onClick={e=>{e.stopPropagation();pop.onSave("","");setPop(null);}}
        style={{background:"none",border:"none",color:"#c5c7d4",fontSize:16,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button>}
    </div>
  );
}

function openPopover(triggerEl,{num,unit,defaultUnit,units,color,onSave}){
  const r=triggerEl.getBoundingClientRect();
  const popH=52;
  const spaceBelow=window.innerHeight-r.bottom;
  const top=spaceBelow>=popH+10?r.bottom+6:r.top-popH-6;
  const left=Math.min(Math.max(r.left,8),window.innerWidth-240);
  if(_setGlobalPop)_setGlobalPop({id:Math.random(),top,left,color,num:num||"",unit:unit||defaultUnit,defaultUnit,units,onSave});
}

// ── FloatingMenu ──
function FloatingMenu({menu,onClose}){
  const ref=useRef();
  useEffect(()=>{
    if(!menu)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    document.addEventListener("mousedown",h);document.addEventListener("touchstart",h,{passive:true});
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};
  },[menu,onClose]);
  if(!menu)return null;
  const left=Math.min(menu.left,window.innerWidth-170);
  const top=menu.top+menu.items.length*38>window.innerHeight?menu.top-menu.items.length*38-8:menu.top;
  return(
    <div ref={ref} className="floating-menu" style={{top,left}}>
      {menu.items.map(item=>(
        <div key={item.label} className="menu-item"
          style={{fontWeight:item.label===menu.current?700:400,background:item.label===menu.current?"#f5f6f8":"#fff"}}
          onMouseDown={e=>{e.preventDefault();menu.onSelect(item.label);onClose();}}>
          {item.dot&&<span style={{width:10,height:10,borderRadius:"50%",background:item.dot,flexShrink:0,display:"inline-block"}}/>}
          {item.avatar&&<Avatar userId={item.avatar} size={18}/>}
          {item.label}
        </div>
      ))}
    </div>
  );
}

function Avatar({userId,size=24}){
  const u=resolveUser(userId);
  return(<div title={u.label} style={{width:size,height:size,borderRadius:"50%",background:u.color+"22",border:`1.5px solid ${u.color}55`,color:u.color,fontSize:Math.floor(size*0.38),fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none",flexShrink:0}}>{u.initials}</div>);
}

function StatusPill({value,options,onOpen,large}){
  const ref=useRef();
  const opt=options.find(o=>o.label===value)||options[0];
  const open=()=>{const r=ref.current.getBoundingClientRect();onOpen({top:r.bottom+4,left:r.left,current:value,items:options.map(o=>({label:o.label,dot:o.color}))});};
  return(<div ref={ref} className={`pill${large?" large":""}`} style={{background:opt.bg,color:opt.color,border:`1.5px solid ${opt.color}33`}} onClick={open}><span style={{width:large?"9px":"7px",height:large?"9px":"7px",borderRadius:"50%",background:opt.color,display:"inline-block",flexShrink:0}}/>{opt.label}</div>);
}

function AssigneePill({value,onOpen}){
  const ref=useRef();
  const open=()=>{const r=ref.current.getBoundingClientRect();onOpen({top:r.bottom+4,left:r.left,current:resolveUser(value).label,items:USERS.map(u=>({label:u.label,avatar:u.id}))});};
  return(<div ref={ref} onClick={open} style={{cursor:"pointer"}}><Avatar userId={value} size={26}/></div>);
}

function InlineSelect({value,options,onChange}){
  const opt=options.find(o=>o.label===value)||options[0];
  return(
    <select value={value} onChange={e=>onChange(e.target.value)}
      onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}
      style={{appearance:"none",WebkitAppearance:"none",background:opt.bg,color:opt.color,border:"none",outline:"none",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",width:"100%",height:"100%",padding:"0 12px",display:"block"}}>
      {options.map(o=><option key={o.label} value={o.label} style={{background:o.bg,color:o.color,fontWeight:600}}>{o.label}</option>)}
    </select>
  );
}

function PopoverPill({num,unit,defaultUnit,units,color,bg,border,icon,placeholder,onSave,large}){
  const ref=useRef();
  const hasVal=num&&num!=="0"&&num!=="";
  const fs=large?"14px":"12px";const pad=large?"6px 13px":"3px 10px";
  const open=e=>{e.stopPropagation();openPopover(ref.current,{num,unit,defaultUnit,units,color,onSave});};
  return(<div ref={ref} className="pill" style={{background:hasVal?bg:"#f5f6f8",color:hasVal?color:"#c5c7d4",border:hasVal?border:"1.5px solid #e6e9ef",fontSize:fs,padding:pad,cursor:"pointer"}} onClick={open}>{hasVal?<>{icon&&<span style={{fontSize:large?"15px":"13px",lineHeight:1,display:"inline-flex",alignItems:"center"}}>{icon}</span>}{num} {unit}</>:<span style={{fontSize:large?"13px":"11px"}}>{placeholder}</span>}</div>);
}

function DelBtn({onDelete}){
  const[conf,setConf]=useState(false);const timer=useRef();
  const handle=e=>{e.stopPropagation();if(conf){onDelete();return;}setConf(true);timer.current=setTimeout(()=>setConf(false),2500);};
  useEffect(()=>()=>clearTimeout(timer.current),[]);
  return(<button className="del-btn" onClick={handle} onTouchEnd={e=>{e.preventDefault();handle(e);}} style={{color:conf?"#e2445c":"#c5c7d4",fontSize:conf?"11px":"17px",fontWeight:conf?700:"normal",minWidth:36}}>{conf?"Sure?":"×"}</button>);
}

function SortHdr({label,field,sort,onSort,style,resizeCol,onResize}){
  const active=sort.field===field;
  const ref=useRef();
  const startResize=e=>{
    e.preventDefault();e.stopPropagation();
    const startX=e.clientX;const startW=ref.current.parentElement.offsetWidth;
    const onMove=ev=>onResize(resizeCol,Math.max(50,startW+(ev.clientX-startX)));
    const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
    document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onUp);
  };
  return(
    <th className="hdr sortable" style={{...style,position:"relative"}} onClick={()=>onSort(field)}>
      <span style={{display:"inline-flex",alignItems:"center",gap:4,color:active?"#0073ea":"#676879"}}>
        {label}<span style={{fontSize:10,opacity:active?1:0.3}}>{active?(sort.dir==="asc"?"▲":"▼"):"▲"}</span>
      </span>
      {resizeCol&&<div ref={ref} className="resize-handle" onMouseDown={startResize} onClick={e=>e.stopPropagation()}/>}
    </th>
  );
}

// ── Notes panel ──
function NotesPanel({task,onUpdate,onClose}){
  const[val,setVal]=useState(task.notes||"");
  const save=()=>onUpdate({notes:val});
  return(
    <div style={{padding:"10px 14px",borderTop:"1px solid #e6e9ef",background:"#fafbfc",animation:"rowIn 0.15s ease"}}>
      <textarea value={val} onChange={e=>setVal(e.target.value)} onBlur={save}
        placeholder="Add notes…"
        style={{width:"100%",border:"1px solid #e6e9ef",borderRadius:6,padding:"8px 10px",fontFamily:"inherit",fontSize:13,color:"#323338",outline:"none",resize:"vertical",minHeight:64,background:"#fff",lineHeight:1.5}}
        onFocus={e=>e.target.style.borderColor="#0073ea"} onBlur={e=>{e.target.style.borderColor="#e6e9ef";save();}}/>
    </div>
  );
}

// ── Desktop Task Row ──
const TaskRow=memo(function TaskRow({task,onUpdate,onDelete,openMenu,isDragging,isDropTarget,onDragStart,onDragEnter,onDragEnd,showWho,groupColor}){
  const[editing,setEditing]=useState(false);
  const[nameVal,setNameVal]=useState(task.name);
  
  const[flashing,setFlashing]=useState(false);
  const inputRef=useRef();
  const taskUser=resolveUser(task.assignee);
  const overdue=isOverdue(task);
  const rel=formatRelDate(task.dueDate);
  const upd=(f,v)=>onUpdate(typeof f==="string"?{[f]:v}:f);

  useEffect(()=>{if(editing)inputRef.current?.focus();},[editing]);
  const saveName=()=>{setEditing(false);if(nameVal.trim()!==task.name)upd("name",nameVal.trim()||task.name);};

  // Flash on update
  const prevStatus=useRef(task.status);
  useEffect(()=>{if(prevStatus.current!==task.status){setFlashing(true);setTimeout(()=>setFlashing(false),600);}prevStatus.current=task.status;},[task.status]);

  const td={borderBottom:"1px solid #e6e9ef",borderRight:"1px solid #e6e9ef",padding:"0 10px",height:42,verticalAlign:"middle"};
  const leftBorder=overdue?"3px solid #e2445c":`3px solid ${groupColor}`;

  return(
    <>
    <tr className={`row-anim${flashing?" row-flash":""}${isDragging?" ":""}`}

// ── Mobile Card ──
const MobileCard=memo(function MobileCard({task,onUpdate,onDelete,openMenu,showWho,groupColor,onDragStart,onDragEnter,onDragEnd,isDragging,isDropTarget}){
  const[editing,setEditing]=useState(false);
  const[nameVal,setNameVal]=useState(task.name);
  const[expanded,setExpanded]=useState(false);
  const[holding,setHolding]=useState(false);
  const inputRef=useRef();
  const cardRef=useRef();
  const holdTimer=useRef();
  const holdingRef=useRef(false);
  const taskUser=resolveUser(task.assignee);
  const overdue=isOverdue(task);
  const rel=formatRelDate(task.dueDate);
  const upd=(f,v)=>onUpdate(typeof f==="string"?{[f]:v}:f);
  useEffect(()=>{if(editing)inputRef.current?.focus();},[editing]);
  const saveName=()=>{setEditing(false);if(nameVal.trim()!==task.name)upd("name",nameVal.trim()||task.name);};

  useEffect(()=>{
    const card=cardRef.current;
    if(!card)return;

    let startY=0;

    const handleTouchStart=e=>{
      if(editing)return;
      startY=e.touches[0].clientY;
      // Prevent text selection during hold
      const preventSelect=e=>e.preventDefault();
      document.addEventListener("selectstart",preventSelect);
      holdTimer.current=setTimeout(()=>{
        holdingRef.current=true;
        setHolding(true);
        if(navigator.vibrate)navigator.vibrate(50);
        onDragStart(task.id);
        document.removeEventListener("selectstart",preventSelect);
      },400);
      // Clean up if touch ends before hold fires
      card.addEventListener("touchend",()=>document.removeEventListener("selectstart",preventSelect),{once:true});
    };

    const handleTouchMove=e=>{
      // Cancel hold if user scrolls before timer fires
      if(!holdingRef.current){
        const dy=Math.abs(e.touches[0].clientY-startY);
        if(dy>8){clearTimeout(holdTimer.current);}
        return;
      }
      e.preventDefault();
      e.stopPropagation();
      const touch=e.touches[0];
      // Hide the dragging card temporarily to find element underneath
      card.style.visibility="hidden";
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      card.style.visibility="visible";
      const target=el?.closest("[data-task-id]");
      if(target&&target.dataset.taskId!==task.id){
        onDragEnter(target.dataset.taskId, target.dataset.groupId);
      }
    };

    const handleTouchEnd=e=>{
      clearTimeout(holdTimer.current);
      if(holdingRef.current){
        holdingRef.current=false;
        setHolding(false);
        onDragEnd();
      }
    };

    card.addEventListener("touchstart",handleTouchStart,{passive:true});
    card.addEventListener("touchmove",handleTouchMove,{passive:false});
    card.addEventListener("touchend",handleTouchEnd,{passive:true});
    return()=>{
      card.removeEventListener("touchstart",handleTouchStart);
      card.removeEventListener("touchmove",handleTouchMove);
      card.removeEventListener("touchend",handleTouchEnd);
    };
  },[task.id,editing,onDragStart,onDragEnter,onDragEnd]);

  return(
    <div ref={cardRef} data-task-id={task.id} data-group-id={groupColor}
      className={`mobile-card${overdue?" overdue":""}${task.status==="Done"?" done":""}`}
      style={{
        borderLeft:`3px solid ${groupColor}`,
        opacity:isDragging?0.35:1,
        boxShadow:holding?"0 8px 24px rgba(0,0,0,0.15)":"",
        border:"1px solid #e6e9ef",
        transition:"opacity 0.15s,box-shadow 0.15s",
        cursor:holding?"grabbing":"default",
        position:"relative",
        zIndex:holding?999:1,
        marginBottom:8,
      }}>

    {holding&&<div style={{position:"absolute",top:6,right:8,fontSize:11,color:"#0073ea",fontWeight:600,background:"#eaf2ff",borderRadius:10,padding:"2px 8px",zIndex:10}}>↕ Reordering</div>}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        {showWho&&<AssigneePill value={taskUser.id} onOpen={md=>openMenu(md,v=>upd("assignee",resolveUser(v).id))}/>}
        {editing
          ?<input ref={inputRef} value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={saveName} onKeyDown={e=>{if(e.key==="Enter")saveName();}}
              style={{flex:1,border:"none",outline:"none",fontFamily:"inherit",fontSize:15,fontWeight:600,background:"transparent",padding:0}}/>
          :<span onClick={()=>setEditing(true)} style={{flex:1,fontSize:15,fontWeight:600,cursor:"text",textDecoration:task.status==="Done"?"line-through":"none",color:task.status==="Done"?"#c5c7d4":"#323338"}}>{task.name||"Untitled"}</span>
        }
        <span style={{fontSize:12,fontWeight:600,color:rel?rel.color:"#c5c7d4",flexShrink:0}}>{rel?rel.label:"No date"}</span>
        <DelBtn onDelete={()=>onDelete(task.id)}/>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:expanded?8:0}}>
        <StatusPill value={task.status} options={STATUS_OPTIONS} onOpen={md=>openMenu(md,v=>upd("status",v))} large/>
        <StatusPill value={task.priority} options={PRIORITY_OPTIONS} onOpen={md=>openMenu(md,v=>upd("priority",v))} large/>
        <button onClick={()=>setExpanded(e=>!e)}
          style={{background:"none",border:"1px solid #e6e9ef",borderRadius:20,padding:"4px 10px",fontFamily:"inherit",fontSize:12,color:"#676879",cursor:"pointer",marginLeft:"auto"}}>
          {expanded?"Less ▴":"More ▾"}
        </button>
      </div>
      {expanded&&<>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:"#676879",fontWeight:600}}>DUE</span>
            <input type="date" value={task.dueDate||""} onChange={e=>upd("dueDate",e.target.value)}
              style={{border:"1px solid #e6e9ef",borderRadius:6,padding:"4px 8px",fontFamily:"inherit",fontSize:12,color:overdue?"#e2445c":"#323338",outline:"none"}}/>
          </div>
          <PopoverPill num={task.durNum} unit={task.durUnit} defaultUnit="mins" units={DUR_UNITS} color="#9b59b6" bg="#f3eaff" border="1.5px solid #9b59b633" icon="⏱" placeholder="Duration" onSave={(n,u)=>upd({durNum:n,durUnit:u})} large/>
          <PopoverPill num={task.recNum} unit={task.recUnit} defaultUnit="Days" units={REC_UNITS} color="#0073ea" bg="#eaf2ff" border="1.5px solid #0073ea33" icon="↻" placeholder="Recurrence" onSave={(n,u)=>upd({recNum:n,recUnit:u})} large/>
        </div>
        <textarea value={task.notes||""} onChange={e=>upd("notes",e.target.value)}
          placeholder="Notes…"
          style={{width:"100%",border:"1px solid #e6e9ef",borderRadius:6,padding:"8px 10px",fontFamily:"inherit",fontSize:13,color:"#323338",outline:"none",resize:"none",minHeight:56,background:"#fafafa",lineHeight:1.5}}
          onFocus={e=>e.target.style.borderColor="#0073ea"} onBlur={e=>e.target.style.borderColor="#e6e9ef"}/>
      </>}
    </div>
  );
});

function GroupSection({group,tasks,openMenu,onUpdate,onDelete,dragState,onDragStart,onDragEnter,onDragEnd,onDropEmpty,onAddTask,sort,onSort,cols,onResize,activeUser,filter}){

              <col style={{width:24}}/>{showWho&&<col style={{width:cols.who}}/>}<col style={{width:cols.name}}/>

                <SortHdr label="Due" field="dueDate" sort={sort} onSort={onSort} style={{...bs}} resizeCol="due" onResize={onResize}/>

                <th className="hdr" style={{...bs,position:"relative"}}>Notes<div className="resize-handle" onMouseDown={e=>{e.preventDefault();e.stopPropagation();const sx=e.clientX;const sw=cols.notes;const om=ev=>onResize("notes",Math.max(60,sw+(ev.clientX-sx)));const ou=()=>{document.removeEventListener("mousemove",om);document.removeEventListener("mouseup",ou);};document.addEventListener("mousemove",om);document.addEventListener("mouseup",ou);}} onClick={e=>e.stopPropagation()}/></th>

                onUpdate={fields=>onUpdate(task.id,fields)} onDelete={onDelete} openMenu={openMenu}

        </div>

// ── Mobile Input Bar ──
function MobileInputBar({newTask,onSave,onCancel,onUpdateNew,openMenu}){
  const inputRef=useRef();const[name,setName]=useState("");
  useEffect(()=>{if(newTask){setName("");setTimeout(()=>inputRef.current?.focus(),80);}},[newTask?.id]);
  if(!newTask)return null;
  const save=()=>{const n=inputRef.current?.value?.trim()||name.trim();if(n)onSave(n);};
  return(
    <div className="mobile-input-bar open">
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <input ref={inputRef} className="bar-input" placeholder="Task name…" value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();save();}if(e.key==="Escape")onCancel();}}/>
        <button className="bar-add" onTouchEnd={e=>{e.preventDefault();save();}} onClick={save}>Add</button>
        <button className="bar-cancel" onTouchEnd={e=>{e.preventDefault();onCancel();}} onClick={onCancel}>×</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        <AssigneePill value={newTask.assignee} onOpen={md=>openMenu(md,v=>onUpdateNew("assignee",resolveUser(v).id))}/>
        <StatusPill value={newTask.status} options={STATUS_OPTIONS} onOpen={md=>openMenu(md,v=>onUpdateNew("status",v))} large/>
        <StatusPill value={newTask.priority} options={PRIORITY_OPTIONS} onOpen={md=>openMenu(md,v=>onUpdateNew("priority",v))} large/>
      </div>
    </div>
  );
}

// ── App ──
function App(){
  const[tasks,setTasks]=useState([]);
  const[activeUser,setActiveUser]=useState("tyler");
  const[search,setSearch]=useState("");
  const[menu,setMenu]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[toast,setToast]=useState(null);
  const[newTask,setNewTask]=useState(null);
  const[drag,setDrag]=useState({draggingId:null,overId:null,overGroup:null});
  const[sort,setSort]=useState({field:null,dir:"asc"});
  const[cols,setCols]=useState({who:38,name:160,status:120,priority:108,due:100,duration:110,recurrence:130,notes:180});
  const[filter,setFilter]=useState("all"); // all | today | overdue

  useEffect(()=>{
    const unsub=db.collection("tasks").onSnapshot(snap=>{
      setTasks(snap.docs.map(d=>({group:"home",assignee:"both",order:0,...d.data(),id:d.id})));
    });
    // Keyboard shortcut
    const onKey=e=>{
      if((e.key==="n"||e.key==="N")&&!e.target.matches("input,textarea,select")){
        setNewTask({id:genId(),name:"",status:"Not Started",priority:"Medium",dueDate:"",recNum:"",recUnit:"Days",durNum:"",durUnit:"mins",group:"home",assignee:"tyler",order:Date.now()});
      }
    };
    document.addEventListener("keydown",onKey);
    return()=>{unsub();document.removeEventListener("keydown",onKey);};
  },[]);

  const openMenu=useCallback((md,onSelect)=>setMenu({...md,onSelect}),[]);
  const closeMenu=useCallback(()=>setMenu(null),[]);
  const showToast=useCallback(msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);},[]);

  const updateTask=useCallback(async(id,fields)=>{
    const task=tasks.find(t=>t.id===id);if(!task)return;
    const updated={...task,...fields};
    if(fields.status==="Done"&&task.recNum&&task.recNum!=="0"&&task.recUnit){
      const rescheduled={...updated,status:"Not Started",dueDate:nextDue(task.dueDate,task.recNum,task.recUnit)};
      setSyncing(true);await saveTask(rescheduled).finally(()=>setSyncing(false));
      showToast("↻ Rescheduled to "+formatRelDate(rescheduled.dueDate)?.label);return;
    }
    setSyncing(true);await saveTask(updated).finally(()=>setSyncing(false));
  },[tasks,showToast]);

  const deleteTask=useCallback(async id=>{setSyncing(true);await deleteTaskDb(id).finally(()=>setSyncing(false));},[]);
  const addTask=useCallback(group=>{
    const t={id:genId(),name:"",status:"Not Started",priority:"Medium",dueDate:"",recNum:"",recUnit:"Days",durNum:"",durUnit:"mins",group,assignee:activeUser==="both"?"both":activeUser,order:Date.now()};
    setNewTask(t);
    if(window.innerWidth>700){
      // desktop inline new row — save immediately with empty name, user types inline
    }
  },[activeUser]);
  const commitNewTask=useCallback(async name=>{if(!newTask||!name.trim())return;const t={...newTask,name:name.trim(),order:Date.now()};setNewTask(null);setSyncing(true);await saveTask(t).finally(()=>setSyncing(false));},[newTask]);

  const onDragStart=useCallback(id=>setDrag({draggingId:id,overId:null,overGroup:null}),[]);
  const onDragEnter=useCallback((id,group)=>setDrag(s=>({...s,overId:id,overGroup:group})),[]);
  const onDragEnd=useCallback(async()=>{
    const{draggingId,overId,overGroup}=drag;
    setDrag({draggingId:null,overId:null,overGroup:null});
    if(!draggingId)return;
    const dragging=tasks.find(t=>t.id===draggingId);if(!dragging)return;
    let reordered;
    if(overId==="__bottom__"&&overGroup){
      // Move to end of target group
      const ng=overGroup;
      const gt=tasks.filter(t=>t.group===ng&&t.id!==draggingId);
      gt.push({...dragging,group:ng});
      reordered=[...tasks.filter(t=>t.group!==ng&&t.id!==draggingId),...gt.map((t,i)=>({...t,order:i}))];
    } else if(overId&&overId!==draggingId){
      const ot=tasks.find(t=>t.id===overId);const ng=ot?.group||overGroup||dragging.group;
      const gt=tasks.filter(t=>t.group===ng&&t.id!==draggingId);
      const oi=gt.findIndex(t=>t.id===overId);gt.splice(oi,0,{...dragging,group:ng});
      reordered=[...tasks.filter(t=>t.group!==ng&&t.id!==draggingId),...gt.map((t,i)=>({...t,order:i}))];
    } else if(overGroup&&overGroup!==dragging.group){
      reordered=tasks.map(t=>t.id===draggingId?{...t,group:overGroup}:t);
    } else return;
    setSyncing(true);await saveTasks(reordered).finally(()=>setSyncing(false));
  },[drag,tasks]);

  const onDropEmpty=useCallback(async gid=>{
    if(!drag.draggingId)return;const task=tasks.find(t=>t.id===drag.draggingId);if(!task)return;
    setDrag({draggingId:null,overId:null,overGroup:null});
    setSyncing(true);await saveTask({...task,group:gid}).finally(()=>setSyncing(false));
  },[drag,tasks]);

  const onSort=useCallback(field=>setSort(s=>({field,dir:s.field===field&&s.dir==="asc"?"desc":"asc"})),[]);
  const onResize=useCallback((col,w)=>setCols(c=>({...c,[col]:w})),[]);

  const sorted=useMemo(()=>{
    const base=[...tasks].sort((a,b)=>(a.order??0)-(b.order??0));
    if(!sort.field)return base;
    return base.sort((a,b)=>{
      let av,bv;
      if(sort.field==="name"){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
      else if(sort.field==="status"){av=statusOrder(a.status);bv=statusOrder(b.status);}
      else if(sort.field==="priority"){av=priorityOrder(a.priority);bv=priorityOrder(b.priority);}
      else if(sort.field==="dueDate"){av=a.dueDate||"9999";bv=b.dueDate||"9999";}
      else if(sort.field==="duration"){av=durToMins(a);bv=durToMins(b);}
      else if(sort.field==="recurrence"){av=recToDays(a);bv=recToDays(b);}
      if(av<bv)return sort.dir==="asc"?-1:1;
      if(av>bv)return sort.dir==="asc"?1:-1;
      return 0;
    });
  },[tasks,sort]);

  const filtered=useMemo(()=>{
    const today=new Date();today.setHours(0,0,0,0);
    return sorted.filter(t=>{
      const uid=resolveUser(t.assignee).id;
      const vis=activeUser==="both"||uid==="both"||uid===activeUser;
      if(!vis)return false;
      if(search&&!t.name.toLowerCase().includes(search.toLowerCase()))return false;
      if(filter==="today"){const d=t.dueDate?new Date(t.dueDate):null;if(d)d.setHours(0,0,0,0);return d&&d<=today&&t.status!=="Done";}
      if(filter==="overdue"){const d=t.dueDate?new Date(t.dueDate):null;if(d)d.setHours(0,0,0,0);return d&&d<today&&t.status!=="Done";}
      return true;
    });
  },[sorted,activeUser,search,filter]);

  const doneCount=useMemo(()=>tasks.filter(t=>t.status==="Done").length,[tasks]);
  const todayCount=useMemo(()=>{
    const today=new Date();today.setHours(0,0,0,0);
    return tasks.filter(t=>{const uid=resolveUser(t.assignee).id;const vis=activeUser==="both"||uid==="both"||uid===activeUser;if(!vis)return false;const d=t.dueDate?new Date(t.dueDate):null;if(d)d.setHours(0,0,0,0);return d&&d<=today&&t.status!=="Done";}).length;
  },[tasks,activeUser]);
  const overdueCount=useMemo(()=>{
    const today=new Date();today.setHours(0,0,0,0);
    return tasks.filter(t=>{const uid=resolveUser(t.assignee).id;const vis=activeUser==="both"||uid==="both"||uid===activeUser;if(!vis)return false;const d=t.dueDate?new Date(t.dueDate):null;if(d)d.setHours(0,0,0,0);return d&&d<today&&t.status!=="Done";}).length;
  },[tasks,activeUser]);

  const isMob=window.innerWidth<=700;

  return(
    <div style={{minHeight:"100vh",background:"#f5f6f8"}}>
      <FloatingMenu menu={menu} onClose={closeMenu}/>
      <GlobalPopover/>

      {/* Top bar */}
      <div className="top-bar" style={{background:"#fff",borderBottom:"1px solid #e6e9ef",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:26,height:26,borderRadius:6,background:"linear-gradient(135deg,#0073ea,#9b59b6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.3"/></svg>
          </div>
          <span style={{fontWeight:700,fontSize:15,color:"#323338"}}>Task Pad</span>
        </div>
        <span className={`sync-dot${syncing?" syncing":""}`} title={syncing?"Syncing…":"Synced"}/>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:3,background:"#f5f6f8",borderRadius:24,padding:3,border:"1px solid #e6e9ef"}}>
          {USERS.map(u=>{const active=activeUser===u.id;return(
            <button key={u.id} className="user-btn" onClick={()=>setActiveUser(u.id)}
              style={{background:active?u.color:"transparent",color:active?"#fff":"#676879",boxShadow:active?`0 2px 8px ${u.color}44`:"none"}}>
              <div style={{width:16,height:16,borderRadius:"50%",background:active?"rgba(255,255,255,0.25)":u.color+"22",color:active?"#fff":u.color,fontSize:8,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{u.initials}</div>
              <span className="user-label">{u.label}</span>
            </button>
          );})}
        </div>
      </div>

      {/* Nav tabs */}
      <div style={{background:"#fff",borderBottom:"1px solid #e6e9ef",display:"flex",alignItems:"center",padding:"0 16px",gap:0}}>
        <button className={`nav-tab${filter==="all"?" active":""}`} onClick={()=>setFilter("all")}>All</button>
        <button className={`nav-tab${filter==="today"?" active":""}`} onClick={()=>setFilter("today")}>
          Due Today {todayCount>0&&<span style={{background:"#fdab3d",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11,fontWeight:700,marginLeft:4}}>{todayCount}</span>}
        </button>
        <button className={`nav-tab${filter==="overdue"?" active":""}`} onClick={()=>setFilter("overdue")}>
          Overdue {overdueCount>0&&<span style={{background:"#e2445c",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11,fontWeight:700,marginLeft:4}}>{overdueCount}</span>}
        </button>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:7,background:"#f5f6f8",border:"1.5px solid #e6e9ef",borderRadius:6,padding:"5px 10px"}}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#c5c7d4" strokeWidth="1.5"/><path d="M10 10l2.5 2.5" stroke="#c5c7d4" strokeWidth="1.5" strokeLinecap="round"/></svg>
            <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}
              style={{border:"none",outline:"none",fontFamily:"inherit",fontSize:13,color:"#323338",background:"transparent",width:120}}/>
          </div>
          <button onClick={()=>exportCSV(tasks)} title="Export CSV"
            style={{background:"none",border:"1px solid #e6e9ef",borderRadius:6,padding:"5px 10px",fontFamily:"inherit",fontSize:12,color:"#676879",cursor:"pointer",whiteSpace:"nowrap"}}>
            ↓ CSV
          </button>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:80,height:5,background:"#e6e9ef",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",background:"#00c875",borderRadius:3,transition:"width 0.4s",width:tasks.length?`${(doneCount/tasks.length)*100}%`:"0%"}}/>
            </div>
            <span style={{fontSize:12,color:"#676879",fontWeight:500,whiteSpace:"nowrap"}}>{doneCount}/{tasks.length}</span>
          </div>
        </div>
      </div>

      {/* Groups */}
      <div className="groups-wrap" style={{padding:"0 0 28px"}}>
        {filter!=="all"&&filtered.length===0&&(
          <div className="empty-state" style={{padding:80}}>
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#c5c7d4" strokeWidth="2"/><path d="M22 32l7 7 13-13" stroke="#00c875" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <span style={{fontSize:16,fontWeight:600,color:"#676879"}}>All caught up!</span>
            <span style={{fontSize:13,color:"#c5c7d4"}}>{filter==="today"?"No tasks due today.":"No overdue tasks — great work!"}</span>
          </div>
        )}
        {GROUPS.map(g=>(
          <GroupSection key={g.id} group={g} tasks={filtered} openMenu={openMenu}
            onUpdate={updateTask} onDelete={deleteTask} dragState={drag}
            onDragStart={onDragStart} onDragEnter={onDragEnter} onDragEnd={onDragEnd}
            onDropEmpty={onDropEmpty} onAddTask={addTask} sort={sort} onSort={onSort}
            cols={cols} onResize={onResize} activeUser={activeUser} filter={filter}/>
        ))}
      </div>

      <MobileInputBar newTask={isMob?newTask:null} onSave={commitNewTask} onCancel={()=>setNewTask(null)}
        onUpdateNew={(f,v)=>setNewTask(t=>({...t,[f]:v}))} openMenu={openMenu}/>

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
const SW=`const CACHE='mytasks-v4';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.mode==='navigate')e.respondWith(fetch(e.request).catch(()=>caches.match('/')));});`;
if('serviceWorker'in navigator){const b=new Blob([SW],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b),{scope:'/'}).catch(()=>{});}
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('ib').style.display='flex';});
function doI(){if(!dp)return;document.getElementById('ib').style.display='none';dp.prompt();dp=null;}
function doD(){document.getElementById('ib').style.display='none';}
window.addEventListener('appinstalled',()=>{document.getElementById('ib').style.display='none';});
</script>

<div id="ib" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999999;align-items:center;justify-content:center;background:rgba(0,0,0,0.5)">
  <div style="background:#fff;border-radius:16px;padding:28px 24px;margin:24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center">
    <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0073ea,#9b59b6);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="32" height="32" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.3"/></svg>
    </div>
    <div style="font-weight:700;font-size:20px;color:#323338;margin-bottom:8px;font-family:'Figtree',sans-serif">Install Task Pad</div>
    <div style="font-size:14px;color:#676879;margin-bottom:24px;line-height:1.5;font-family:'Figtree',sans-serif">Add to your home screen for instant access.</div>
    <button onclick="doI()" style="display:block;width:100%;background:#0073ea;color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Figtree',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px">Install App</button>
    <button onclick="doD()" style="display:block;width:100%;background:none;border:none;color:#676879;font-family:'Figtree',sans-serif;font-size:14px;cursor:pointer;padding:10px">Not now</button>
  </div>
</div>
</body>
</html>
