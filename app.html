<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Figtree','Segoe UI',sans-serif;background:#f5f6f8;min-height:100vh;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:0.4;cursor:pointer;}
@keyframes rowIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes flash{0%{background:#e6f7ff}100%{background:transparent}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.row-anim{animation:rowIn 0.18s ease both;}
.row-flash{animation:flash 0.6s ease;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323338;color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:toastIn 0.3s ease;z-index:99998;white-space:nowrap;}
.floating-menu{position:fixed;z-index:99999;background:#fff;border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,0.18);border:1px solid #e6e9ef;overflow:hidden;}
.menu-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;color:#323338;transition:background 0.1s;white-space:nowrap;}
.menu-item:hover{background:#f5f6f8;}
.hdr{padding:10px 12px;font-size:11px;font-weight:700;color:#676879;letter-spacing:0.4px;text-transform:uppercase;border-right:1px solid #e6e9ef;background:#f5f6f8;user-select:none;text-align:left;white-space:nowrap;}
.hdr.sortable{cursor:pointer;}
.hdr.sortable:hover{background:#edf0f4;color:#323338;}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;user-select:none;transition:opacity 0.1s;padding:3px 10px;font-size:12px;}
.pill:active{opacity:0.75;}
.pill.large{font-size:14px;padding:6px 13px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#00c875;display:inline-block;flex-shrink:0;}
.sync-dot.syncing{background:#fdab3d;animation:pulse 1s infinite;}
.del-btn{background:none;border:none;cursor:pointer;color:#c5c7d4;font-size:17px;padding:0 8px;transition:color 0.15s;line-height:1;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.del-btn:hover,.del-btn:active{color:#e2445c;}
.user-btn{border:none;border-radius:20px;padding:6px 12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
.add-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;cursor:pointer;color:#676879;font-size:13px;font-weight:500;background:none;border:none;font-family:inherit;transition:color 0.15s;}
.add-btn:hover{color:#0073ea;}
.mobile-card{background:#fff;border-radius:10px;border:1px solid #e6e9ef;padding:12px 14px;margin-bottom:8px;animation:rowIn 0.18s ease both;position:relative;overflow:hidden;transition:transform 0.2s;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.mobile-card input,.mobile-card textarea,.mobile-card select{-webkit-user-select:text;user-select:text;}
.mobile-card.overdue{border-left:3px solid #e2445c;}
.mobile-card.done{opacity:0.55;}
.bar-input{flex:1;border:1.5px solid #e6e9ef;border-radius:8px;padding:10px 14px;font-family:inherit;font-size:16px;color:#323338;outline:none;background:#f5f6f8;}
.bar-input:focus{border-color:#0073ea;background:#fff;}
.bar-add{background:#0073ea;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.bar-cancel{background:none;border:none;color:#c5c7d4;font-size:24px;cursor:pointer;padding:0 4px;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
/* Mobile add modal */
.add-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9998;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;}
.add-modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:600px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.nav-tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-family:inherit;font-size:13px;font-weight:600;color:#676879;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.nav-tab.active{color:#0073ea;border-bottom-color:#0073ea;}
.nav-tab:hover{color:#323338;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:#c5c7d4;gap:12px;}
.resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:10;}
.resize-handle:hover{background:rgba(0,115,234,0.2);}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9990;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease;}
.settings-panel{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);animation:fadeIn 0.2s ease;}
.settings-section{padding:20px 24px;border-bottom:1px solid #e6e9ef;}
.settings-section:last-child{border-bottom:none;}
.settings-title{font-size:11px;font-weight:700;color:#676879;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:14px;}
.settings-input{width:100%;border:1.5px solid #e6e9ef;border-radius:8px;padding:9px 12px;font-family:inherit;font-size:14px;color:#323338;outline:none;transition:border-color 0.15s;}
.settings-input:focus{border-color:#0073ea;}
.settings-btn{background:#0073ea;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:background 0.15s;}
.settings-btn:hover{background:#0060c0;}
.settings-btn.danger{background:#fff;color:#e2445c;border:1.5px solid #e2445c;}
.settings-btn.danger:hover{background:#fce8ec;}
.settings-btn.secondary{background:#f5f6f8;color:#323338;border:none;}
.settings-btn.secondary:hover{background:#edf0f4;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;border:3px solid transparent;flex-shrink:0;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:#323338;box-shadow:0 0 0 2px #fff inset;}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f5f6f8;}
.activity-item:last-child{border-bottom:none;}
.activity-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
/* Auth */
.auth-card{background:#fff;border-radius:16px;padding:36px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,0.10);animation:fadeIn 0.4s ease;}
.auth-input{width:100%;border:1.5px solid #e6e9ef;border-radius:8px;padding:11px 14px;font-family:inherit;font-size:15px;color:#323338;outline:none;transition:border-color 0.15s;margin-bottom:12px;}
.auth-input:focus{border-color:#0073ea;}
.auth-btn{width:100%;background:#0073ea;color:#fff;border:none;border-radius:8px;padding:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:background 0.15s;margin-bottom:10px;}
.auth-btn:hover{background:#0060c0;}
.auth-btn.google{background:#fff;color:#323338;border:1.5px solid #e6e9ef;display:flex;align-items:center;justify-content:center;gap:10px;}
.auth-btn.google:hover{background:#f5f6f8;}
.auth-link{background:none;border:none;color:#0073ea;font-family:inherit;font-size:13px;cursor:pointer;padding:0;}
.auth-link:hover{text-decoration:underline;}
.auth-error{background:#fce8ec;color:#e2445c;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;}
/* Board selector */
.board-card{background:#fff;border-radius:12px;border:1.5px solid #e6e9ef;padding:18px 20px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.board-card:hover{border-color:#0073ea;box-shadow:0 2px 12px rgba(0,115,234,0.1);}
.board-card.active{border-color:#0073ea;background:#f0f6ff;}
@media(max-width:700px){
  .desktop-only{display:none !important;}
  .mobile-only{display:block !important;}
  .top-bar{padding:10px 12px !important;}
  .action-bar{padding:8px 12px 6px !important;}
  .groups-wrap{padding:0 0 90px !important;}
  .group-card{border-radius:0 !important;border-left:none !important;border-right:none !important;margin-bottom:8px !important;}
  .user-label{display:none;}
}
@media(min-width:701px){
  .desktop-only{display:block !important;}
  .mobile-only{display:none !important;}
}
.mobile-only{display:none;}
</style>

<body>

<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo,memo}=React;

const FIREBASE_CONFIG={

firebase.initializeApp(FIREBASE_CONFIG);
const db=firebase.firestore();
const auth=firebase.auth();
const googleProvider=new firebase.auth.GoogleAuthProvider();

const STATUS_OPTIONS=[
  {label:"Not Started",color:"#c4c4c4",bg:"#f0f0f0"},
  {label:"In Progress",color:"#fdab3d",bg:"#fff5e6"},
  {label:"Stuck",color:"#e2445c",bg:"#fce8ec"},
  {label:"Done",color:"#00c875",bg:"#e6faf3"},
];
const PRIORITY_OPTIONS=[
  {label:"Critical",color:"#333333",bg:"#e8e8e8"},
  {label:"High",color:"#e2445c",bg:"#fce8ec"},
  {label:"Medium",color:"#fdab3d",bg:"#fff5e6"},
  {label:"Low",color:"#579bfc",bg:"#eaf2ff"},
];
const REC_UNITS=["Minutes","Hours","Days","Weeks","Months"];
const DUR_UNITS=["mins","hrs","days"];
const DEFAULT_GROUPS=[];
const GROUP_COLORS=["#0073ea","#9b59b6","#00c875","#e2445c","#fdab3d","#579bfc","#333333","#00d4d4"];
const MEMBER_COLORS=["#0073ea","#e2445c","#00c875","#9b59b6","#fdab3d","#579bfc"];

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function resolveUser(id,members){
  if(!members)return{id,label:id,color:"#c5c7d4",initials:"?"};
  const m=members.find(m=>m.uid===id);
  if(!m)return{id,label:"Unknown",color:"#c5c7d4",initials:"?"};
  const parts=(m.displayName||m.email||"?").split(" ");
  const initials=parts.length>1?parts[0][0]+parts[1][0]:parts[0].slice(0,2);
  return{id:m.uid,label:m.displayName||m.email,color:m.color||"#0073ea",initials:initials.toUpperCase()};
}
function addDays(ds,d){const dt=new Date(ds);dt.setDate(dt.getDate()+d);return dt.toISOString().slice(0,10);}
function nextDue(due,num,unit){
  if(!due||!num||num==="0")return due;
  const n=parseInt(num)||1;const d=new Date(due);
  if(unit==="Days")d.setDate(d.getDate()+n);
  else if(unit==="Weeks")d.setDate(d.getDate()+n*7);
  else if(unit==="Months")d.setMonth(d.getMonth()+n);
  return d.toISOString().slice(0,10);
}
function parseTaskDate(ds){
  if(!ds)return null;
  // Has time component (datetime-local format: YYYY-MM-DDTHH:MM)
  if(ds.includes("T")){
    return new Date(ds); // datetime-local is local time, no timezone issue
  }
  // Date only
  const[y,m,day]=ds.split("-").map(Number);
  return new Date(y,m-1,day);
}

function formatRelDate(ds){
  if(!ds)return null;
  const hasTime=ds.includes("T");
  const d=parseTaskDate(ds);
  const today=new Date();today.setHours(0,0,0,0);
  const dDate=new Date(d);dDate.setHours(0,0,0,0);
  const diff=Math.round((dDate-today)/(1000*60*60*24));
  // Format time suffix if present
  const timeSuffix=hasTime?` ${d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`:""
  if(diff===0)return{label:"Today"+timeSuffix,color:"#e2445c"};
  if(diff===1)return{label:"Tomorrow"+timeSuffix,color:"#fdab3d"};
  if(diff===-1)return{label:"Yesterday"+timeSuffix,color:"#e2445c"};
  if(diff<0)return{label:`${Math.abs(diff)}d overdue${timeSuffix}`,color:"#e2445c"};
  if(diff<=7)return{label:`${diff}d${timeSuffix}`,color:"#fdab3d"};
  return{label:dDate.toLocaleDateString("en-US",{month:"short",day:"numeric"})+timeSuffix,color:"#676879"};
}
function isOverdue(task){
  if(!task.dueDate||task.status==="Done")return false;
  const d=parseTaskDate(task.dueDate);
  const now=new Date();
  // If has time, compare against now; if date only, compare against start of day
  if(task.dueDate.includes("T"))return d<now;
  const today=new Date();today.setHours(0,0,0,0);
  return d<today;
}
function priorityOrder(p){return{Critical:0,High:1,Medium:2,Low:3}[p]??99;}
function statusOrder(s){return{"Not Started":0,"In Progress":1,Stuck:2,Done:3}[s]??99;}
function durToMins(t){const n=parseFloat(t.durNum)||0;if(t.durUnit==="hrs")return n*60;if(t.durUnit==="days")return n*1440;return n;}
function recToDays(t){const n=parseFloat(t.recNum)||0;const u=t.recUnit||"Days";if(u==="Minutes")return n/1440;if(u==="Hours")return n/24;if(u==="Weeks")return n*7;if(u==="Months")return n*30;return n;}
function exportCSV(tasks,members){
  const headers=["Name","Status","Priority","Due Date","Duration","Recurrence","Group","Assignee","Notes"];
  const rows=tasks.map(t=>[t.name,t.status,t.priority,t.dueDate||"",t.durNum?`${t.durNum} ${t.durUnit}`:"",t.recNum?`${t.recNum} ${t.recUnit}`:"",t.group,resolveUser(t.assignee,members).label,t.notes||""].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
  const csv=[headers.join(","),...rows].join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="docket.csv";a.click();
}

// ── Firebase helpers ──
function boardRef(boardId){return db.collection("boards").doc(boardId);}
function tasksRef(boardId){return db.collection("boards").doc(boardId).collection("tasks");}
function membersRef(boardId){return db.collection("boards").doc(boardId).collection("members");}
async function saveTask(boardId,task){await tasksRef(boardId).doc(task.id).set(task);}
function activityRef(boardId){return db.collection("boards").doc(boardId).collection("activity");}
async function logActivity(boardId,uid,displayName,action,taskName){
  try{
    await activityRef(boardId).add({uid,displayName,action,taskName,timestamp:Date.now()});
  }catch(e){}
}
async function deleteTaskDb(boardId,id){await tasksRef(boardId).doc(id).delete();}
async function saveTasks(boardId,list){const b=db.batch();list.forEach(t=>b.set(tasksRef(boardId).doc(t.id),t));await b.commit();}

// ── Global Popover ──
let _setGlobalPop=null;
function GlobalPopover(){
  const[pop,setPop]=useState(null);
  _setGlobalPop=setPop;
  const inputRef=useRef();
  const[num,setNum]=useState("");
  const[unit,setUnit]=useState("");
  useEffect(()=>{
    if(pop){
      setNum(pop.num&&pop.num!=="0"&&pop.num!==""?String(pop.num):"");
      setUnit(pop.unit||pop.defaultUnit);
      setTimeout(()=>{ if(inputRef.current){inputRef.current.focus();inputRef.current.select();} },50);
    }
  },[pop?.id]);
  useEffect(()=>{
    if(!pop)return;
    const h=e=>{const el=document.getElementById("gpop");if(el&&!el.contains(e.target)){pop.onSave(num,unit);setPop(null);}};
    document.addEventListener("mousedown",h);document.addEventListener("touchstart",h,{passive:true});
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};
  },[pop,num,unit]);
  if(!pop)return null;
  const hasVal=num&&num!=="0"&&num!=="";
  return(
    <div id="gpop" style={{position:"fixed",top:pop.top,left:pop.left,zIndex:999999,background:"#fff",borderRadius:8,boxShadow:"0 4px 24px rgba(0,0,0,0.16)",border:"1px solid #e6e9ef",padding:"10px 12px",display:"flex",gap:8,alignItems:"center"}}>
      <input ref={inputRef} type="number" min="0" placeholder="0" value={num} onChange={e=>setNum(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter"){pop.onSave(num,unit);setPop(null);}if(e.key==="Escape")setPop(null);}}
        style={{width:58,border:"1.5px solid #e6e9ef",borderRadius:6,padding:"6px 8px",fontFamily:"inherit",fontSize:14,color:"#323338",outline:"none",textAlign:"center"}}
        onFocus={e=>e.target.style.borderColor=pop.color} onBlur={e=>e.target.style.borderColor="#e6e9ef"}/>
      <select value={unit} onChange={e=>setUnit(e.target.value)}
        style={{border:"1.5px solid #e6e9ef",borderRadius:6,padding:"6px",fontFamily:"inherit",fontSize:13,color:"#323338",outline:"none",cursor:"pointer",background:"#fff"}}>
        {pop.units.map(u=><option key={u}>{u}</option>)}
      </select>
      <button onClick={e=>{e.stopPropagation();pop.onSave(num,unit);setPop(null);}}
        style={{background:pop.color,color:"#fff",border:"none",borderRadius:6,padding:"6px 12px",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer"}}>✓</button>
      {hasVal&&<button onClick={e=>{e.stopPropagation();pop.onSave("","");setPop(null);}}
        style={{background:"none",border:"none",color:"#c5c7d4",fontSize:16,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button>}
    </div>
  );
}
function openPopover(el,opts){
  const r=el.getBoundingClientRect();
  const popH=52;const spaceBelow=window.innerHeight-r.bottom;
  const top=spaceBelow>=popH+10?r.bottom+6:r.top-popH-6;
  const left=Math.min(Math.max(r.left,8),window.innerWidth-240);
  if(_setGlobalPop)_setGlobalPop({id:Math.random(),top,left,...opts});
}

// ── FloatingMenu ──
function FloatingMenu({menu,onClose}){
  const ref=useRef();
  useEffect(()=>{
    if(!menu)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    document.addEventListener("mousedown",h);document.addEventListener("touchstart",h,{passive:true});
    return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};
  },[menu,onClose]);
  if(!menu)return null;
  const left=Math.min(menu.left,window.innerWidth-170);
  const top=menu.top+menu.items.length*38>window.innerHeight?menu.top-menu.items.length*38-8:menu.top;
  return(
    <div ref={ref} className="floating-menu" style={{top,left}}>
      {menu.items.map(item=>(
        <div key={item.label} className="menu-item"
          style={{fontWeight:item.label===menu.current?700:400,background:item.label===menu.current?"#f5f6f8":"#fff"}}
          onMouseDown={e=>{e.preventDefault();menu.onSelect(item.label);onClose();}}>
          {item.dot&&<span style={{width:10,height:10,borderRadius:"50%",background:item.dot,flexShrink:0,display:"inline-block"}}/>}
          {item.avatar&&<Avatar user={item.avatar}/>}
          {item.label}
        </div>
      ))}
    </div>
  );
}

function Avatar({user,size=24}){
  if(!user)return null;
  return(<div title={user.label} style={{width:size,height:size,borderRadius:"50%",background:user.color+"22",border:`1.5px solid ${user.color}55`,color:user.color,fontSize:Math.floor(size*0.38),fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none",flexShrink:0}}>{user.initials}</div>);
}

function StatusPill({value,options,onOpen,large}){
  const ref=useRef();
  const opt=options.find(o=>o.label===value)||options[0];
  const open=()=>{const r=ref.current.getBoundingClientRect();onOpen({top:r.bottom+4,left:r.left,current:value,items:options.map(o=>({label:o.label,dot:o.color}))});};
  return(<div ref={ref} className={`pill${large?" large":""}`} style={{background:opt.bg,color:opt.color,border:`1.5px solid ${opt.color}33`}} onClick={open}><span style={{width:large?"9px":"7px",height:large?"9px":"7px",borderRadius:"50%",background:opt.color,display:"inline-block",flexShrink:0}}/>{opt.label}</div>);
}

function AssigneePill({value,members,onOpen}){

function PopoverPill({num,unit,defaultUnit,units,color,bg,border,icon,placeholder,onSave,large}){

  const hasVal=num&&num!=="0"&&num!=="";
  const fs=large?"14px":"12px";const pad=large?"6px 13px":"3px 10px";

function DelBtn({onDelete}){
  const[conf,setConf]=useState(false);const timer=useRef();
  const handle=e=>{e.stopPropagation();if(conf){onDelete();return;}setConf(true);timer.current=setTimeout(()=>setConf(false),2500);};
  useEffect(()=>()=>clearTimeout(timer.current),[]);
  return(<button className="del-btn" onClick={handle} onTouchEnd={e=>{e.preventDefault();handle(e);}} style={{color:conf?"#e2445c":"#c5c7d4",fontSize:conf?"11px":"17px",fontWeight:conf?700:"normal",minWidth:36}}>{conf?"Sure?":"×"}</button>);
}

function SortHdr({label,field,sort,onSort,style,resizeCol,onResize}){
  const active=sort.field===field;
  const ref=useRef();
  const startResize=e=>{
    e.preventDefault();e.stopPropagation();
    const sx=e.clientX;const sw=ref.current.parentElement.offsetWidth;
    const om=ev=>onResize(resizeCol,Math.max(50,sw+(ev.clientX-sx)));
    const ou=()=>{document.removeEventListener("mousemove",om);document.removeEventListener("mouseup",ou);};
    document.addEventListener("mousemove",om);document.addEventListener("mouseup",ou);
  };
  return(
    <th className="hdr sortable" style={{...style,position:"relative"}} onClick={()=>onSort(field)}>
      <span style={{display:"inline-flex",alignItems:"center",gap:4,color:active?"#0073ea":"#676879"}}>
        {label}<span style={{fontSize:10,opacity:active?1:0.3}}>{active?(sort.dir==="asc"?"▲":"▼"):"▲"}</span>
      </span>
      {resizeCol&&<div ref={ref} className="resize-handle" onMouseDown={startResize} onClick={e=>e.stopPropagation()}/>}
    </th>
  );
}

function ActivityPanel({boardId,members,onClose}){
  const[activities,setActivities]=useState([]);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    const unsub=activityRef(boardId).limit(50).onSnapshot(snap=>{
      const sorted=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.timestamp-a.timestamp);
      setActivities(sorted);
      setLoading(false);
    });
    return unsub;
  },[boardId]);

  function timeAgo(ts){
    const diff=Date.now()-ts;
    if(diff<60000)return"Just now";
    if(diff<3600000)return`${Math.floor(diff/60000)}m ago`;
    if(diff<86400000)return`${Math.floor(diff/3600000)}h ago`;
    return`${Math.floor(diff/86400000)}d ago`;
  }

  return(
    <div className="settings-overlay" onClick={e=>{if(e.target.className==="settings-overlay")onClose();}}>
      <div className="settings-panel">
        <div style={{display:"flex",alignItems:"center",padding:"20px 24px",borderBottom:"1px solid #e6e9ef"}}>
          <span style={{fontWeight:700,fontSize:16,color:"#323338"}}>Activity Log</span>
          <button onClick={onClose} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",color:"#c5c7d4",fontSize:22,lineHeight:1}}>×</button>

        <div style={{padding:"8px 24px 20px"}}>
          {loading&&<div style={{color:"#c5c7d4",fontSize:13,padding:"20px 0",textAlign:"center"}}>Loading…</div>}
          {!loading&&activities.length===0&&<div style={{color:"#c5c7d4",fontSize:13,padding:"20px 0",textAlign:"center"}}>No activity yet.</div>}
          {activities.map(a=>{
            const u=resolveUser(a.uid,members);
            return(
              <div key={a.id} className="activity-item">
                <div className="activity-avatar" style={{background:u.color+"22",color:u.color}}>{u.initials}</div>
                <div style={{flex:1}}>
                  <span style={{fontWeight:600,color:"#323338",fontSize:13}}>{u.label}</span>
                  <span style={{color:"#676879",fontSize:13}}> {a.action} </span>
                  <span style={{fontWeight:600,color:"#323338",fontSize:13}}>"{a.taskName}"</span>
                  <div style={{fontSize:11,color:"#c5c7d4",marginTop:2}}>{timeAgo(a.timestamp)}</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Board Selector ──
function BoardSelector({user,onSelect}){
  const[boards,setBoards]=useState([]);
  const[loading,setLoading]=useState(true);
  const[creating,setCreating]=useState(false);
  const[newName,setNewName]=useState("");
  const[inviteCode,setInviteCode]=useState("");
  const[joiningCode,setJoiningCode]=useState("");
  const[error,setError]=useState("");

  // Auto-join from URL invite code on board selector
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const code=params.get("join");
    if(!code)return;
    setJoiningCode(code.toUpperCase());
    // auto-submit after short delay
    setTimeout(()=>document.getElementById("join-board-btn")?.click(),300);
  },[]);

  useEffect(()=>{
    const unsub=db.collection("userBoards").doc(user.uid).onSnapshot(
      async snap=>{
        try{
          const data=snap.data();
          const boardIds=data?.boardIds||[];
          if(boardIds.length===0){setBoards([]);setLoading(false);return;}
          const boardDocs=await Promise.all(boardIds.map(id=>boardRef(id).get()));
          setBoards(boardDocs.filter(d=>d.exists).map(d=>({id:d.id,...d.data()})));
        }catch(e){console.error("Board load error:",e);}
        setLoading(false);
      },
      err=>{console.error("userBoards error:",err);setLoading(false);}
    );
    return unsub;
  },[user.uid]);

  const createBoard=async()=>{
    if(!newName.trim())return;
    setLoading(true);
    const id=genId();
    const code=Math.random().toString(36).slice(2,8).toUpperCase();
    const batch=db.batch();
    batch.set(boardRef(id),{name:newName.trim(),createdBy:user.uid,createdAt:Date.now(),inviteCode:code,groups:DEFAULT_GROUPS});
    batch.set(membersRef(id).doc(user.uid),{uid:user.uid,displayName:user.displayName||user.email,email:user.email,color:MEMBER_COLORS[0],role:"admin",joinedAt:Date.now()});
    batch.set(db.collection("userBoards").doc(user.uid),{boardIds:firebase.firestore.FieldValue.arrayUnion(id)},{merge:true});
    await batch.commit();
    setCreating(false);setNewName("");
    onSelect({id,name:newName.trim()});
  };

  const joinBoard=async()=>{
    if(!joiningCode.trim())return;
    setError("");
    const code=joiningCode.trim().toUpperCase();
    const snap=await db.collection("boards").where("inviteCode","==",code).get();
    if(snap.empty){setError("Invalid invite code.");return;}
    const boardDoc=snap.docs[0];
    const color=MEMBER_COLORS[Math.floor(Math.random()*MEMBER_COLORS.length)];
    const batch=db.batch();
    batch.set(membersRef(boardDoc.id).doc(user.uid),{uid:user.uid,displayName:user.displayName||user.email,email:user.email,color,role:"member",joinedAt:Date.now()});
    batch.set(db.collection("userBoards").doc(user.uid),{boardIds:firebase.firestore.FieldValue.arrayUnion(boardDoc.id)},{merge:true});
    await batch.commit();
    onSelect({id:boardDoc.id,name:boardDoc.data().name});
  };

  if(loading)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#676879"}}>Loading…</div>;

  return(
    <div style={{minHeight:"100vh",background:"#f5f6f8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:480}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:28}}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#0073ea,#9b59b6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="18" height="18" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.3"/></svg>
          </div>
          <span style={{fontSize:20,fontWeight:700,color:"#323338"}}>Docket</span>

              <svg width="20" height="20" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.3"/></svg>
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:"#323338",fontSize:15}}>{b.name}</div>
              <div style={{fontSize:12,color:"#676879",marginTop:2}}>Invite code: <span style={{fontWeight:700,letterSpacing:1}}>{b.inviteCode}</span></div>

            <span style={{color:"#c5c7d4",fontSize:20}}>›</span>

        {creating?(
