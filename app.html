              onKeyDown={e=>{if(e.key==="Enter")createBoard();}} autoFocus style={{marginBottom:10}}/>
            <div style={{display:"flex",gap:8}}>
              <button className="auth-btn" onClick={createBoard} style={{marginBottom:0}}>Create</button>
              <button onClick={()=>setCreating(false)} style={{background:"#f5f6f8",border:"none",borderRadius:8,padding:"10px 16px",fontFamily:"inherit",fontSize:14,cursor:"pointer",color:"#676879"}}>Cancel</button>
            </div>
          </div>
        ):(
          <button className="board-card" style={{border:"2px dashed #e6e9ef",justifyContent:"center",gap:8,color:"#676879"}} onClick={()=>setCreating(true)}>
            <span style={{fontSize:22,lineHeight:1,color:"#0073ea"}}>+</span>
            <span style={{fontWeight:600}}>Create new board</span>
          </button>
        )}

        <div style={{marginTop:16,background:"#fff",borderRadius:12,border:"1.5px solid #e6e9ef",padding:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#676879",marginBottom:10}}>JOIN WITH INVITE CODE</div>
          {error&&<div className="auth-error">{error}</div>}
          <div style={{display:"flex",gap:8}}>
            <input className="auth-input" placeholder="Enter 6-digit code" value={joiningCode} onChange={e=>setJoiningCode(e.target.value.toUpperCase())}
              style={{marginBottom:0,flex:1,letterSpacing:2}} maxLength={6}/>
            <button id="join-board-btn" className="auth-btn" onClick={joinBoard} style={{marginBottom:0,width:"auto",padding:"0 20px"}}>Join</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Desktop Task Row ──
const TaskRow=memo(function TaskRow({task,onUpdate,onDelete,openMenu,isDragging,isDropTarget,onDragStart,onDragEnter,onDragEnd,showWho,groupColor,members}){
  const[editing,setEditing]=useState(false);
  const[nameVal,setNameVal]=useState(task.name);
  const[flashing,setFlashing]=useState(false);
  const inputRef=useRef();
  const taskUser=resolveUser(task.assignee,members);
  const overdue=isOverdue(task);
  const rel=formatRelDate(task.dueDate);
  const upd=(f,v)=>onUpdate(typeof f==="string"?{[f]:v}:f);
  useEffect(()=>{if(editing)inputRef.current?.focus();},[editing]);
  const saveName=()=>{setEditing(false);if(nameVal.trim()!==task.name)upd("name",nameVal.trim()||task.name);};
  const prevStatus=useRef(task.status);
  useEffect(()=>{if(prevStatus.current!==task.status){setFlashing(true);setTimeout(()=>setFlashing(false),600);}prevStatus.current=task.status;},[task.status]);
  const td={borderBottom:"1px solid #e6e9ef",borderRight:"1px solid #e6e9ef",padding:"0 10px",height:42,verticalAlign:"middle"};
  return(
    <tr className={`row-anim${flashing?" row-flash":""}`}
      style={{background:isDragging?"#f0f6ff":isDropTarget?"#eaf2ff":task.status==="Done"?"#fafafa":"#fff",opacity:isDragging?0.4:task.status==="Done"?0.6:1,borderTop:isDropTarget?"2px solid #0073ea":undefined,borderLeft:`3px solid ${overdue?"#e2445c":groupColor}`,transition:"background 0.2s,opacity 0.2s"}}
      draggable onDragStart={e=>{if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT"||e.target.tagName==="TEXTAREA"){e.preventDefault();return;}onDragStart(task.id);}}
      onDragEnter={()=>onDragEnter(task.id)} onDragOver={e=>e.preventDefault()} onDragEnd={onDragEnd}>
      <td style={{...td,width:24,textAlign:"center",cursor:"grab",color:"#c5c7d4",fontSize:12,userSelect:"none",borderLeft:"none",padding:"0 4px"}}>⠿</td>
      {showWho&&<td style={{...td,width:38,padding:0}}><div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}><AssigneePill value={taskUser.id} members={members} onOpen={md=>openMenu(md,v=>{const m=members.find(m=>resolveUser(m.uid,members).label===v);if(m)upd("assignee",m.uid);})}/></div></td>}
      <td style={{...td}}>
        {editing
          ?<input ref={inputRef} value={nameVal} onChange={e=>setNameVal(e.target.value)}
              onBlur={saveName} onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape"){setNameVal(task.name);setEditing(false);}}}
              style={{width:"100%",border:"none",outline:"none",fontFamily:"inherit",fontSize:14,background:"transparent"}}/>
          :<span onClick={()=>setEditing(true)} style={{fontSize:14,cursor:"text",display:"block",textDecoration:task.status==="Done"?"line-through":"none",color:task.status==="Done"?"#c5c7d4":"#323338"}}>
              {task.name||<span style={{color:"#c5c7d4"}}>Untitled</span>}
            </span>
        }
      </td>
      <td style={{...td,padding:0}}><InlineSelect value={task.status} options={STATUS_OPTIONS} onChange={v=>upd("status",v)}/></td>
      <td style={{...td,padding:0}}><InlineSelect value={task.priority} options={PRIORITY_OPTIONS} onChange={v=>upd("priority",v)}/></td>
      <td style={{...td,position:"relative",overflow:"visible"}}>
        {(()=>{
          const[showPicker,setShowPicker]=React.useState(false);
          const hasTime=task.dueDate&&task.dueDate.includes("T");
          const dtVal=task.dueDate?(hasTime?task.dueDate:task.dueDate+"T00:00"):"";
          return(<>
            <span onClick={()=>setShowPicker(p=>!p)}
              style={{fontSize:12,fontWeight:600,color:rel?rel.color:"#c5c7d4",cursor:"pointer",whiteSpace:"nowrap",display:"block"}}>
              {rel?rel.label:"No date"}
            </span>
            {showPicker&&(
              <div style={{position:"absolute",zIndex:9999,background:"#fff",border:"1px solid #e6e9ef",borderRadius:10,padding:12,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",top:"100%",left:0,marginTop:4,minWidth:220}}>
                <div style={{fontSize:11,fontWeight:700,color:"#676879",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Date & Time</div>
                <input type="datetime-local" value={dtVal}
                  onChange={e=>{upd("dueDate",e.target.value||"");}}
                  style={{border:"1.5px solid #e6e9ef",borderRadius:6,padding:"6px 8px",fontFamily:"inherit",fontSize:13,outline:"none",width:"100%"}}
                  onFocus={e=>e.target.style.borderColor="#0073ea"}
                  onBlur={e=>{e.target.style.borderColor="#e6e9ef";setTimeout(()=>setShowPicker(false),200);}}
                  autoFocus/>
                <div style={{display:"flex",gap:6,marginTop:8}}>
                  <button onClick={()=>{const d=new Date();upd("dueDate",d.toISOString().slice(0,16));setShowPicker(false);}}
                    style={{flex:1,background:"#f5f6f8",border:"none",borderRadius:6,padding:"5px 0",fontFamily:"inherit",fontSize:12,cursor:"pointer",color:"#323338"}}>Now</button>
                  <button onClick={()=>{upd("dueDate","");setShowPicker(false);}}
                    style={{flex:1,background:"#fce8ec",border:"none",borderRadius:6,padding:"5px 0",fontFamily:"inherit",fontSize:12,cursor:"pointer",color:"#e2445c"}}>Clear</button>
                  <button onClick={()=>setShowPicker(false)}
                    style={{flex:1,background:"#0073ea",color:"#fff",border:"none",borderRadius:6,padding:"5px 0",fontFamily:"inherit",fontSize:12,cursor:"pointer",fontWeight:600}}>Done</button>
                </div>
              </div>
            )}
          </>);
        })()}
      </td>
      <td style={{...td}}><PopoverPill num={task.durNum} unit={task.durUnit} defaultUnit="mins" units={DUR_UNITS} color="#9b59b6" bg="#f3eaff" border="1.5px solid #9b59b633" icon="⏱" placeholder="Duration" onSave={(n,u)=>upd({durNum:n,durUnit:u})}/></td>
      <td style={{...td}}><PopoverPill num={task.recNum} unit={task.recUnit} defaultUnit="Days" units={REC_UNITS} color="#0073ea" bg="#eaf2ff" border="1.5px solid #0073ea33" icon="↻" placeholder="Recurrence" onSave={(n,u)=>upd({recNum:n,recUnit:u})}/></td>
      <td style={{...td,borderRight:"none",padding:"2px 8px"}}>
        <textarea value={task.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="Notes…"
          style={{width:"100%",border:"none",outline:"none",fontFamily:"inherit",fontSize:12,color:"#323338",resize:"none",height:36,background:"transparent",lineHeight:1.4,padding:"4px 0"}}/>
      </td>
      <td style={{borderBottom:"1px solid #e6e9ef",width:36,textAlign:"center",verticalAlign:"middle"}}><DelBtn onDelete={()=>onDelete(task.id)}/></td>
    </tr>
  );
});

// ── Mobile Card ──
const MobileCard=memo(function MobileCard({task,onUpdate,onDelete,openMenu,showWho,groupColor,members,onDragStart,onDragEnter,onDragEnd,isDragging,isDropTarget}){
  const[editing,setEditing]=useState(false);
  const[nameVal,setNameVal]=useState(task.name);
  const[expanded,setExpanded]=useState(false);
  const[holding,setHolding]=useState(false);
  const inputRef=useRef();
  const cardRef=useRef();
  const holdTimer=useRef();
  const holdingRef=useRef(false);
  const taskUser=resolveUser(task.assignee,members);
  const overdue=isOverdue(task);
  const rel=formatRelDate(task.dueDate);
  const upd=(f,v)=>onUpdate(typeof f==="string"?{[f]:v}:f);
  useEffect(()=>{if(editing)inputRef.current?.focus();},[editing]);
  const saveName=()=>{setEditing(false);if(nameVal.trim()!==task.name)upd("name",nameVal.trim()||task.name);};

  useEffect(()=>{
    const card=cardRef.current;if(!card)return;
    let startY=0;
    const handleTouchStart=e=>{
      if(editing)return;
      startY=e.touches[0].clientY;
      const preventSelect=e=>e.preventDefault();
      document.addEventListener("selectstart",preventSelect);
      holdTimer.current=setTimeout(()=>{
        holdingRef.current=true;setHolding(true);
        if(navigator.vibrate)navigator.vibrate(50);
        onDragStart(task.id);
        document.removeEventListener("selectstart",preventSelect);
      },400);
      card.addEventListener("touchend",()=>document.removeEventListener("selectstart",preventSelect),{once:true});
    };
    const handleTouchMove=e=>{
      if(!holdingRef.current){const dy=Math.abs(e.touches[0].clientY-startY);if(dy>8)clearTimeout(holdTimer.current);return;}
      e.preventDefault();e.stopPropagation();
      const touch=e.touches[0];
      card.style.visibility="hidden";
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      card.style.visibility="visible";
      const target=el?.closest("[data-task-id]");
      if(target&&target.dataset.taskId!==task.id)onDragEnter(target.dataset.taskId,target.dataset.groupId);
    };
    const handleTouchEnd=e=>{
      clearTimeout(holdTimer.current);
      if(holdingRef.current){holdingRef.current=false;setHolding(false);onDragEnd();}
    };
    card.addEventListener("touchstart",handleTouchStart,{passive:true});
    card.addEventListener("touchmove",handleTouchMove,{passive:false});
    card.addEventListener("touchend",handleTouchEnd,{passive:true});
    return()=>{card.removeEventListener("touchstart",handleTouchStart);card.removeEventListener("touchmove",handleTouchMove);card.removeEventListener("touchend",handleTouchEnd);};
  },[task.id,editing,onDragStart,onDragEnter,onDragEnd]);

  return(
    <div ref={cardRef} data-task-id={task.id} data-group-id={groupColor}
      className={`mobile-card${overdue?" overdue":""}${task.status==="Done"?" done":""}`}
      style={{borderLeft:`3px solid ${groupColor}`,opacity:isDragging?0.35:1,boxShadow:holding?"0 8px 24px rgba(0,0,0,0.15)":"",border:"1px solid #e6e9ef",transition:"opacity 0.15s,box-shadow 0.15s",cursor:holding?"grabbing":"default",position:"relative",zIndex:holding?999:1,marginBottom:8}}>
      {holding&&<div style={{position:"absolute",top:6,right:8,fontSize:11,color:"#0073ea",fontWeight:600,background:"#eaf2ff",borderRadius:10,padding:"2px 8px",zIndex:10}}>↕ Reordering</div>}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        {showWho&&<AssigneePill value={taskUser.id} members={members} onOpen={md=>openMenu(md,v=>{const m=members.find(m=>resolveUser(m.uid,members).label===v);if(m)upd("assignee",m.uid);})}/>}
        {editing
          ?<input ref={inputRef} value={nameVal} onChange={e=>setNameVal(e.target.value)} onBlur={saveName} onKeyDown={e=>{if(e.key==="Enter")saveName();}}
              style={{flex:1,border:"none",outline:"none",fontFamily:"inherit",fontSize:15,fontWeight:600,background:"transparent",padding:0}}/>
          :<span onClick={()=>setEditing(true)} style={{flex:1,fontSize:15,fontWeight:600,cursor:"text",textDecoration:task.status==="Done"?"line-through":"none",color:task.status==="Done"?"#c5c7d4":"#323338"}}>{task.name||"Untitled"}</span>
        }
        {rel&&<span style={{fontSize:12,fontWeight:600,color:rel.color,flexShrink:0}}>{rel.label}</span>}
        <DelBtn onDelete={()=>onDelete(task.id)}/>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:expanded?8:0}}>
        <StatusPill value={task.status} options={STATUS_OPTIONS} onOpen={md=>openMenu(md,v=>upd("status",v))} large/>
        <StatusPill value={task.priority} options={PRIORITY_OPTIONS} onOpen={md=>openMenu(md,v=>upd("priority",v))} large/>
        <button onClick={()=>setExpanded(e=>!e)} style={{background:"none",border:"1px solid #e6e9ef",borderRadius:20,padding:"4px 10px",fontFamily:"inherit",fontSize:12,color:"#676879",cursor:"pointer",marginLeft:"auto"}}>{expanded?"Less ▴":"More ▾"}</button>
      </div>
      {expanded&&<>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:"#676879",fontWeight:600}}>DUE</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="date"
                value={task.dueDate?task.dueDate.split("T")[0]:""}
                onChange={e=>{
                  const d=e.target.value;
                  // Preserve existing time if any
                  const existingTime=task.dueDate?.includes("T")?task.dueDate.split("T")[1]:"";
                  upd("dueDate",existingTime?d+"T"+existingTime:d);
                }}
                style={{border:"1px solid #e6e9ef",borderRadius:6,padding:"4px 8px",fontFamily:"inherit",fontSize:12,color:overdue?"#e2445c":"#323338",outline:"none",flex:1}}/>
              <input type="time"
                value={task.dueDate?.includes("T")?task.dueDate.split("T")[1]:""}
                onChange={e=>{
                  const t=e.target.value;
                  const existingDate=task.dueDate?task.dueDate.split("T")[0]:"";
                  if(existingDate)upd("dueDate",existingDate+"T"+t);
                }}
                placeholder="Time"
                style={{border:"1px solid #e6e9ef",borderRadius:6,padding:"4px 8px",fontFamily:"inherit",fontSize:12,color:"#323338",outline:"none",width:90}}/>
              {task.dueDate&&<button onClick={()=>upd("dueDate","")}
                style={{background:"none",border:"none",color:"#c5c7d4",fontSize:16,cursor:"pointer",padding:"0 2px",lineHeight:1,flexShrink:0}}>×</button>}
            </div>
          </div>
          <PopoverPill num={task.durNum} unit={task.durUnit} defaultUnit="mins" units={DUR_UNITS} color="#9b59b6" bg="#f3eaff" border="1.5px solid #9b59b633" icon="⏱" placeholder="Duration" onSave={(n,u)=>upd({durNum:n,durUnit:u})} large/>
          <PopoverPill num={task.recNum} unit={task.recUnit} defaultUnit="Days" units={REC_UNITS} color="#0073ea" bg="#eaf2ff" border="1.5px solid #0073ea33" icon="↻" placeholder="Recurrence" onSave={(n,u)=>upd({recNum:n,recUnit:u})} large/>
        </div>
        <textarea value={task.notes||""} onChange={e=>upd("notes",e.target.value)} placeholder="Notes…"
          style={{width:"100%",border:"1px solid #e6e9ef",borderRadius:6,padding:"8px 10px",fontFamily:"inherit",fontSize:13,color:"#323338",outline:"none",resize:"none",minHeight:56,background:"#fafafa",lineHeight:1.5}}
          onFocus={e=>e.target.style.borderColor="#0073ea"} onBlur={e=>e.target.style.borderColor="#e6e9ef"}/>
      </>}
    </div>
  );
});

// ── Group Section ──
function GroupSection({group,tasks,openMenu,onUpdate,onDelete,dragState,onDragStart,onDragEnter,onDragEnd,onDropEmpty,onAddTask,sort,onSort,cols,onResize,showWho,filter,members,onDeleteGroup,onRenameGroup,newTask,onCommitNewTask,onCancelNewTask,onUpdateNewTask}){
  const[collapsed,setCollapsed]=useState(false);
  const[editingName,setEditingName]=useState(false);
  const[groupNameVal,setGroupNameVal]=useState(group.label);
  const groupTasks=tasks.filter(t=>t.group===group.id);
  const doneCount=groupTasks.filter(t=>t.status==="Done").length;
  const bs={borderRight:"1px solid #e6e9ef"};
  if(filter!=="all"&&groupTasks.length===0)return null;

  return(
    <div className="group-card" style={{marginBottom:8,borderTop:"1px solid #e6e9ef",borderBottom:"1px solid #e6e9ef",background:"#fff"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:collapsed?"none":"1px solid #e6e9ef"}}>
        <div style={{width:11,height:11,borderRadius:"50%",background:group.color,flexShrink:0}}/>
        {editingName
          ?<input autoFocus value={groupNameVal} onChange={e=>setGroupNameVal(e.target.value)}
              onBlur={()=>{if(groupNameVal.trim()&&groupNameVal!==group.label)onRenameGroup(group.id,groupNameVal.trim());setEditingName(false);}}
              onKeyDown={e=>{if(e.key==="Enter"&&groupNameVal.trim()){onRenameGroup(group.id,groupNameVal.trim());setEditingName(false);}if(e.key==="Escape")setEditingName(false);}}
              style={{border:"none",outline:"none",fontFamily:"inherit",fontSize:14,fontWeight:700,color:"#323338",background:"transparent",width:120}}/>
          :<span onDoubleClick={()=>{setGroupNameVal(group.label);setEditingName(true);}} style={{fontSize:14,fontWeight:700,color:"#323338",cursor:"pointer"}} title="Double-click to rename">{group.label}</span>
        }
        <span style={{fontSize:12,color:"#c5c7d4",background:"#f5f6f8",borderRadius:10,padding:"1px 8px",fontWeight:600}}>{doneCount}/{groupTasks.length}</span>
        <span onClick={()=>setCollapsed(c=>!c)} style={{marginLeft:"auto",fontSize:12,color:"#c5c7d4",display:"inline-block",transform:collapsed?"rotate(-90deg)":"rotate(0deg)",transition:"transform 0.2s",cursor:"pointer",padding:"0 4px"}}>▾</span>
        <button onClick={()=>{if(groupTasks.length>0&&!confirm(`Delete "${group.label}" and its ${groupTasks.length} task(s)?`))return;onDeleteGroup(group.id);}}
          style={{background:"none",border:"none",cursor:"pointer",color:"#c5c7d4",fontSize:14,padding:"0 2px",lineHeight:1,transition:"color 0.15s"}}
          title="Delete group"
          onMouseEnter={e=>e.currentTarget.style.color="#e2445c"}
          onMouseLeave={e=>e.currentTarget.style.color="#c5c7d4"}>⊗</button>
      </div>
      {!collapsed&&<>
        <div className="desktop-only">
          <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
            <colgroup>
              <col style={{width:24}}/>{showWho&&<col style={{width:cols.who}}/>}<col style={{width:cols.name}}/>
              <col style={{width:cols.status}}/><col style={{width:cols.priority}}/><col style={{width:cols.due}}/>
              <col style={{width:cols.duration}}/><col style={{width:cols.recurrence}}/><col style={{width:cols.notes}}/><col style={{width:36}}/>
            </colgroup>
            <thead>
              <tr style={{borderBottom:"1px solid #e6e9ef"}}>
                <th className="hdr" style={{...bs,width:24,padding:"10px 4px"}}/>
                {showWho&&<th className="hdr" style={{...bs,textAlign:"center"}}>Who</th>}
                <SortHdr label="Task" field="name" sort={sort} onSort={onSort} style={{...bs}} resizeCol="name" onResize={onResize}/>
                <SortHdr label="Status" field="status" sort={sort} onSort={onSort} style={{...bs}} resizeCol="status" onResize={onResize}/>
                <SortHdr label="Priority" field="priority" sort={sort} onSort={onSort} style={{...bs}} resizeCol="priority" onResize={onResize}/>
                <SortHdr label="Due" field="dueDate" sort={sort} onSort={onSort} style={{...bs}} resizeCol="due" onResize={onResize}/>
                <SortHdr label="Duration" field="duration" sort={sort} onSort={onSort} style={{...bs}} resizeCol="duration" onResize={onResize}/>
                <SortHdr label="Recurrence" field="recurrence" sort={sort} onSort={onSort} style={{...bs}} resizeCol="recurrence" onResize={onResize}/>
                <th className="hdr" style={{...bs,position:"relative"}}>Notes
                  <div className="resize-handle" onMouseDown={e=>{e.preventDefault();e.stopPropagation();const sx=e.clientX;const sw=cols.notes;const om=ev=>onResize("notes",Math.max(60,sw+(ev.clientX-sx)));const ou=()=>{document.removeEventListener("mousemove",om);document.removeEventListener("mouseup",ou);};document.addEventListener("mousemove",om);document.addEventListener("mouseup",ou);}} onClick={e=>e.stopPropagation()}/>
                </th>
                <th className="hdr" style={{borderRight:"none"}}/>
              </tr>
            </thead>
            <tbody>
              {groupTasks.length===0
                ?<tr><td colSpan={showWho?10:9}><div onDragOver={e=>e.preventDefault()} onDrop={()=>onDropEmpty(group.id)} style={{padding:32,color:"#c5c7d4",fontSize:13,textAlign:"center",background:dragState.overGroup===group.id?"#f0f6ff":"transparent"}}>{dragState.draggingId?"Drop here ↓":"No tasks yet"}</div></td></tr>
                :groupTasks.map(task=>(
                  <TaskRow key={task.id} task={task} isDragging={dragState.draggingId===task.id}
                    isDropTarget={dragState.overId===task.id&&dragState.draggingId!==task.id}
                    groupColor={group.color} showWho={showWho} members={members}
                    onUpdate={fields=>onUpdate(task.id,fields)} onDelete={onDelete} openMenu={openMenu}
                    onDragStart={onDragStart} onDragEnter={id=>onDragEnter(id,group.id)} onDragEnd={onDragEnd}/>
                ))
              }
            </tbody>
          </table>
          {filter==="all"&&<>
            {newTask?.group===group.id&&(
              <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
                <colgroup>
                  <col style={{width:24}}/>{showWho&&<col style={{width:cols.who}}/>}<col/>
                  <col style={{width:cols.status}}/><col style={{width:cols.priority}}/><col style={{width:cols.due}}/>
                  <col style={{width:cols.duration}}/><col style={{width:cols.recurrence}}/><col style={{width:cols.notes}}/><col style={{width:36}}/>
                </colgroup>
                <tbody>
                  <tr data-newrow="1" style={{background:"#f0f6ff",borderBottom:"1px solid #e6e9ef",borderLeft:`3px solid ${group.color}`}}>
                    <td style={{width:24,padding:"0 4px",verticalAlign:"middle",borderRight:"1px solid #e6e9ef"}}/>
                    {showWho&&<td style={{width:cols.who,padding:0,borderRight:"1px solid #e6e9ef",verticalAlign:"middle"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:42}}>
                        <AssigneePill value={newTask.assignee} members={members} onOpen={md=>openMenu(md,v=>{const m=members.find(m=>resolveUser(m.uid,members).label===v);if(m)onUpdateNewTask("assignee",m.uid);})}/>
                      </div>
                    </td>}
                    <td style={{borderRight:"1px solid #e6e9ef",padding:"0 10px",verticalAlign:"middle"}}>
                      <input
                        autoFocus
                        ref={el=>{if(el)el.focus();}}
                        placeholder="Type item name…"
                        style={{width:"100%",border:"none",outline:"none",fontFamily:"inherit",fontSize:14,background:"transparent",color:"#323338"}}
                        onKeyDown={e=>{
                          if(e.key==="Enter"){
                            e.preventDefault();
                            const val=e.target.value.trim();
                            if(val)onCommitNewTask(val);
                          }
                          if(e.key==="Escape")onCancelNewTask();
                        }}
                        onBlur={e=>{
                          const val=e.target.value.trim();
                          setTimeout(()=>{
                            const active=document.activeElement;
                            const inRow=active&&active.closest&&active.closest("[data-newrow]");
                            if(!inRow){
                              if(val)onCommitNewTask(val);
                              else onCancelNewTask();
                            }
                          },250);
                        }}
                        onChange={e=>{
                          // Keep newTask name in sync as user types
                          if(onUpdateNewTask)onUpdateNewTask("name",e.target.value);
                        }}/>
                    </td>
                    <td style={{padding:0,borderRight:"1px solid #e6e9ef",verticalAlign:"middle"}}>
                      <InlineSelect value={newTask.status} options={STATUS_OPTIONS} onChange={v=>onUpdateNewTask("status",v)}/>
                    </td>
                    <td style={{padding:0,borderRight:"1px solid #e6e9ef",verticalAlign:"middle"}}>
                      <InlineSelect value={newTask.priority} options={PRIORITY_OPTIONS} onChange={v=>onUpdateNewTask("priority",v)}/>
                    </td>
                    <td style={{borderRight:"1px solid #e6e9ef",padding:"0 10px",verticalAlign:"middle"}}>
                      <span style={{fontSize:12,color:"#c5c7d4"}}>Tab or click away to save · Esc to cancel</span>
                    </td>
                    <td colSpan={3} style={{borderRight:"1px solid #e6e9ef"}}/>
                    <td style={{verticalAlign:"middle",textAlign:"center"}}>
                      <button onClick={onCancelNewTask} style={{background:"none",border:"none",cursor:"pointer",color:"#c5c7d4",fontSize:17,padding:"0 8px"}}>×</button>
                    </td>
                  </tr>
                </tbody>
              </table>
            )}
            <div style={{borderTop:"1px solid #e6e9ef"}}><button className="add-btn" onClick={()=>onAddTask(group.id)}><span style={{fontSize:18,lineHeight:1,color:group.color}}>+</span> Add task</button></div>
          </>}
        </div>
        <div className="mobile-only" style={{padding:"10px 12px"}}>
          {groupTasks.length===0&&<div className="empty-state"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="8" y="8" width="32" height="32" rx="4" stroke="#c5c7d4" strokeWidth="2"/><path d="M16 24h16M16 30h10" stroke="#c5c7d4" strokeWidth="2" strokeLinecap="round"/><path d="M16 18h16" stroke="#c5c7d4" strokeWidth="2" strokeLinecap="round"/></svg><span style={{fontSize:13}}>No tasks yet</span></div>}
          {groupTasks.map((task,idx)=>(
            <React.Fragment key={task.id}>
              {(()=>{const isActiveBottom=dragState.overId===task.id&&dragState.draggingId!==task.id;return isActiveBottom?(
                <div style={{height:4,background:"#0073ea",borderRadius:2,margin:"0 0 2px 0",boxShadow:"0 0 0 2px #fff,0 0 0 4px #0073ea,0 2px 8px rgba(0,115,234,0.5)",position:"relative",zIndex:20}}>
                  <div style={{position:"absolute",left:-4,top:"50%",transform:"translateY(-50%)",width:10,height:10,borderRadius:"50%",background:"#0073ea",border:"2px solid #fff"}}/>
                  <div style={{position:"absolute",right:-4,top:"50%",transform:"translateY(-50%)",width:10,height:10,borderRadius:"50%",background:"#0073ea",border:"2px solid #fff"}}/>
                </div>):null;})()}
              <MobileCard task={task} showWho={showWho} groupColor={group.color} members={members}
                onUpdate={fields=>onUpdate(task.id,fields)} onDelete={onDelete} openMenu={openMenu}
                isDragging={dragState.draggingId===task.id} isDropTarget={false}
                onDragStart={onDragStart} onDragEnter={(id,grp)=>onDragEnter(id,group.id)} onDragEnd={onDragEnd}/>
            </React.Fragment>
          ))}
          {(()=>{const isActiveBottom=dragState.overId==="__bottom__"&&dragState.overGroup===group.id;return(
            <div data-task-id="__bottom__" data-group-id={group.id} style={{height:40,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8,marginTop:2}}>
              {isActiveBottom&&(<div style={{height:4,width:"100%",background:"#0073ea",borderRadius:2,boxShadow:"0 0 0 2px #fff,0 0 0 4px #0073ea,0 2px 8px rgba(0,115,234,0.5)",position:"relative"}}>
                <div style={{position:"absolute",left:-4,top:"50%",transform:"translateY(-50%)",width:10,height:10,borderRadius:"50%",background:"#0073ea",border:"2px solid #fff"}}/>
                <div style={{position:"absolute",right:-4,top:"50%",transform:"translateY(-50%)",width:10,height:10,borderRadius:"50%",background:"#0073ea",border:"2px solid #fff"}}/>
              </div>)}
            </div>
          );})()}
          {filter==="all"&&<button style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"12px",background:"none",border:"2px dashed #e6e9ef",borderRadius:10,marginTop:4,fontFamily:"inherit",fontSize:14,fontWeight:600,color:"#676879",cursor:"pointer"}} onClick={()=>onAddTask(group.id)}><span style={{fontSize:18,lineHeight:1,color:group.color}}>+</span> Add task</button>}
        </div>
      </>}
    </div>
  );
}

// Mobile: modal sheet from bottom
function AddModal({newTask,onSave,onCancel,onUpdateNew,openMenu,members,groups}){
  const inputRef=useRef();
  const[name,setName]=useState("");
  useEffect(()=>{if(newTask){setName("");setTimeout(()=>inputRef.current?.focus(),80);}},[newTask?.id]);
  if(!newTask)return null;
  const save=()=>{const n=inputRef.current?.value?.trim()||name.trim();if(n)onSave(n);};
  const group=groups.find(g=>g.id===newTask.group);
  return(
    <div className="add-modal-overlay" onClick={e=>{if(e.target.className==="add-modal-overlay")onCancel();}}>
      <div className="add-modal">
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          {group&&<div style={{width:10,height:10,borderRadius:"50%",background:group.color,flexShrink:0}}/>}
          <span style={{fontWeight:700,fontSize:15,color:"#323338"}}>Add to {group?.label||"group"}</span>
          <button onClick={onCancel} style={{marginLeft:"auto",background:"none",border:"none",color:"#c5c7d4",fontSize:22,cursor:"pointer",lineHeight:1,padding:0}}>×</button>
        </div>
        <input ref={inputRef} className="bar-input" placeholder="Item name…" value={name}
          onChange={e=>setName(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();save();}if(e.key==="Escape")onCancel();}}
          style={{marginBottom:12,width:"100%"}}/>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:16}}>
          {members.length>1&&<AssigneePill value={newTask.assignee} members={members} onOpen={md=>openMenu(md,v=>{const m=members.find(m=>resolveUser(m.uid,members).label===v);if(m)onUpdateNew("assignee",m.uid);})}/>}
          <StatusPill value={newTask.status} options={STATUS_OPTIONS} onOpen={md=>openMenu(md,v=>onUpdateNew("status",v))} large/>
          <StatusPill value={newTask.priority} options={PRIORITY_OPTIONS} onOpen={md=>openMenu(md,v=>onUpdateNew("priority",v))} large/>
        </div>
        <button className="bar-add" onClick={save} onTouchEnd={e=>{e.preventDefault();save();}} style={{width:"100%",borderRadius:10,padding:13,fontSize:16}}>Add Item</button>
      </div>
    </div>
  );
}

// ── Main App ──
function App(){
  const[authUser,setAuthUser]=useState(undefined); // undefined=loading
  const[board,setBoard]=useState(null);
  const boardIdRef=useRef(null);

  // Load board from localStorage after auth
  useEffect(()=>{
    try{
      const saved=localStorage.getItem("docket_board");
      if(saved){const b=JSON.parse(saved);setBoard(b);boardIdRef.current=b.id;}
    }catch(e){}
  },[]);

  const selectBoard=useCallback((b)=>{
    boardIdRef.current=b?.id||null;
    setBoard(b);
    if(b)localStorage.setItem("docket_board",JSON.stringify(b));
    else localStorage.removeItem("docket_board");
  },[]);
  const[tasks,setTasks]=useState([]);
  const[members,setMembers]=useState([]);
  const[activeUserId,setActiveUserId]=useState(null);
  const[search,setSearch]=useState("");
  const[menu,setMenu]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[toast,setToast]=useState(null);
  const[newTask,setNewTask]=useState(null);
  const[drag,setDrag]=useState({draggingId:null,overId:null,overGroup:null});
  const[sort,setSort]=useState({field:null,dir:"asc"});
  const[cols,setCols]=useState({who:38,name:160,status:120,priority:108,due:100,duration:110,recurrence:130,notes:180});
  const[filter,setFilter]=useState("all");

  // Check for invite code in URL
  const urlInviteCode=useMemo(()=>{
    const params=new URLSearchParams(window.location.search);
    return params.get("join")||null;
  },[]);

  // Auth listener
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(u=>{setAuthUser(u||null);if(u)setActiveUserId(u.uid);});
    return unsub;
  },[]);

  // Auto-join board if invite code in URL
  useEffect(()=>{
    if(!urlInviteCode||!authUser||board)return;
    (async()=>{
      try{
        const snap=await db.collection("boards").where("inviteCode","==",urlInviteCode.toUpperCase()).get();
        if(snap.empty){showToast("Invalid invite link.");return;}
        const boardDoc=snap.docs[0];
        const boardData={id:boardDoc.id,...boardDoc.data()};
        // Check if already a member
        const memberDoc=await membersRef(boardDoc.id).doc(authUser.uid).get();
        if(!memberDoc.exists){
          const color=MEMBER_COLORS[Math.floor(Math.random()*MEMBER_COLORS.length)];
          const batch=db.batch();
          batch.set(membersRef(boardDoc.id).doc(authUser.uid),{uid:authUser.uid,displayName:authUser.displayName||authUser.email,email:authUser.email,color,role:"member",joinedAt:Date.now()});
          batch.set(db.collection("userBoards").doc(authUser.uid),{boardIds:firebase.firestore.FieldValue.arrayUnion(boardDoc.id)},{merge:true});
          await batch.commit();
        }
        setBoard(boardData);
        // Clean URL
        window.history.replaceState({},"",window.location.pathname);
        showToast("✓ Joined "+boardData.name+"!");
      }catch(e){showToast("Could not join board. Try again.");}
    })();
  },[urlInviteCode,authUser,board]);

  // Board data listeners
  useEffect(()=>{
    const bid=board?.id;
    if(!bid)return;
    boardIdRef.current=bid;

    const unsubBoard=db.collection("boards").doc(bid).onSnapshot(snap=>{
      if(!snap.exists)return;
      const data=snap.data();
      setBoard(b=>b?{...b,groups:data.groups||b.groups,name:data.name||b.name,inviteCode:data.inviteCode||b.inviteCode}:b);
    },err=>console.error("Board:",err));

    const unsubTasks=db.collection("boards").doc(bid).collection("tasks").onSnapshot(snap=>{
      setTasks(snap.docs.map(d=>({order:0,...d.data(),id:d.id})));
    },err=>console.error("Tasks:",err));

    const unsubMembers=db.collection("boards").doc(bid).collection("members").onSnapshot(snap=>{
      setMembers(snap.docs.map(d=>d.data()));
    },err=>console.error("Members:",err));

    return()=>{unsubBoard();unsubTasks();unsubMembers();};
  },[board?.id]);

  const[showProfile,setShowProfile]=useState(false);
  const[showBoardSettings,setShowBoardSettings]=useState(false);
  const[showActivity,setShowActivity]=useState(false);

  // Keyboard shortcut
  useEffect(()=>{
    if(!board)return;
    const onKey=e=>{
      if((e.key==="n"||e.key==="N")&&!e.target.matches("input,textarea,select")){
        setNewTask({id:genId(),name:"",status:"Not Started",priority:"Medium",dueDate:"",recNum:"",recUnit:"Days",durNum:"",durUnit:"mins",group:"home",assignee:authUser?.uid||"",order:Date.now()});
      }
    };
    document.addEventListener("keydown",onKey);
    return()=>document.removeEventListener("keydown",onKey);
  },[board,authUser]);

  const openMenu=useCallback((md,onSelect)=>setMenu({...md,onSelect}),[]);
  const closeMenu=useCallback(()=>setMenu(null),[]);
  const showToast=useCallback(msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);},[]);

  const updateTask=useCallback(async(id,fields)=>{
    const task=tasks.find(t=>t.id===id);if(!task)return;
    const bid=boardIdRef.current||board?.id;
    if(!bid){console.error("No board ID for updateTask");return;}
    const updated={...task,...fields};
    if(fields.status==="Done"&&task.recNum&&task.recNum!=="0"&&task.recUnit){
      const rescheduled={...updated,status:"Not Started",dueDate:nextDue(task.dueDate,task.recNum,task.recUnit)};
      setSyncing(true);await saveTask(bid,rescheduled).finally(()=>setSyncing(false));
      showToast("↻ Rescheduled to "+(formatRelDate(rescheduled.dueDate)?.label||rescheduled.dueDate));
      logActivity(board.id,authUser.uid,authUser.displayName||authUser.email,"completed (rescheduled)",task.name);
      return;
    }
    // Log meaningful changes
    if(fields.status&&fields.status!==task.status)logActivity(board.id,authUser.uid,authUser.displayName||authUser.email,`marked "${fields.status}"`,task.name);
    else if(fields.name&&fields.name!==task.name)logActivity(board.id,authUser.uid,authUser.displayName||authUser.email,"renamed",fields.name);
    else if(fields.assignee&&fields.assignee!==task.assignee)logActivity(board.id,authUser.uid,authUser.displayName||authUser.email,"reassigned",task.name);
    setSyncing(true);await saveTask(bid,updated).finally(()=>setSyncing(false));
  },[tasks,board,authUser,showToast]);

  const deleteTask=useCallback(async id=>{
    const bid=boardIdRef.current||board?.id;
    if(!bid)return;
    const task=tasks.find(t=>t.id===id);
    if(task)logActivity(bid,authUser.uid,authUser.displayName||authUser.email,"deleted",task.name);
    setSyncing(true);await deleteTaskDb(bid,id).finally(()=>setSyncing(false));
  },[tasks,board,authUser]);

  const addTask=useCallback(group=>{
    setNewTask({id:genId(),name:"",status:"Not Started",priority:"Medium",dueDate:"",recNum:"",recUnit:"Days",durNum:"",durUnit:"mins",group,assignee:authUser?.uid||"",order:Date.now()});
  },[authUser]);

  const commitNewTask=useCallback(async name=>{
    if(!newTask||!name.trim())return;
    const bid=boardIdRef.current||board?.id;
    if(!bid)return;
    const t={...newTask,name:name.trim(),order:Date.now()};
    setNewTask(null);setSyncing(true);
    try{
      await db.collection("boards").doc(bid).collection("tasks").doc(t.id).set(t);
      logActivity(bid,authUser?.uid,authUser?.displayName||authUser?.email,"created",name.trim());
    }catch(e){console.error("Save failed:",e.code,e.message);alert("Save failed: "+e.message);}
    setSyncing(false);
  },[newTask,board,authUser]);

  const onDragStart=useCallback(id=>setDrag({draggingId:id,overId:null,overGroup:null}),[]);
  const onDragEnter=useCallback((id,group)=>setDrag(s=>({...s,overId:id,overGroup:group})),[]);
  const onDragEnd=useCallback(async()=>{
    const{draggingId,overId,overGroup}=drag;
    setDrag({draggingId:null,overId:null,overGroup:null});
    if(!draggingId)return;
    const dragging=tasks.find(t=>t.id===draggingId);if(!dragging)return;
    let reordered;
    if(overId==="__bottom__"&&overGroup){
      const ng=overGroup;const gt=tasks.filter(t=>t.group===ng&&t.id!==draggingId);
      gt.push({...dragging,group:ng});
      reordered=[...tasks.filter(t=>t.group!==ng&&t.id!==draggingId),...gt.map((t,i)=>({...t,order:i}))];
    } else if(overId&&overId!==draggingId){
      const ot=tasks.find(t=>t.id===overId);const ng=ot?.group||overGroup||dragging.group;
      const gt=tasks.filter(t=>t.group===ng&&t.id!==draggingId);
      const oi=gt.findIndex(t=>t.id===overId);gt.splice(oi,0,{...dragging,group:ng});
      reordered=[...tasks.filter(t=>t.group!==ng&&t.id!==draggingId),...gt.map((t,i)=>({...t,order:i}))];
    } else if(overGroup&&overGroup!==dragging.group){
      reordered=tasks.map(t=>t.id===draggingId?{...t,group:overGroup}:t);
    } else return;
    setSyncing(true);await saveTasks(board.id,reordered).finally(()=>setSyncing(false));
  },[drag,tasks,board]);

  const onDropEmpty=useCallback(async gid=>{
    if(!drag.draggingId)return;const task=tasks.find(t=>t.id===drag.draggingId);if(!task)return;
    setDrag({draggingId:null,overId:null,overGroup:null});
    setSyncing(true);await saveTask(board.id,{...task,group:gid}).finally(()=>setSyncing(false));
  },[drag,tasks,board]);

  const onSort=useCallback(field=>setSort(s=>({field,dir:s.field===field&&s.dir==="asc"?"desc":"asc"})),[]);
  const onResize=useCallback((col,w)=>setCols(c=>({...c,[col]:w})),[]);

  const sorted=useMemo(()=>{
    const base=[...tasks].sort((a,b)=>(a.order??0)-(b.order??0));
    if(!sort.field)return base;
    return base.sort((a,b)=>{
      let av,bv;
      if(sort.field==="name"){av=a.name.toLowerCase();bv=b.name.toLowerCase();}
      else if(sort.field==="status"){av=statusOrder(a.status);bv=statusOrder(b.status);}
      else if(sort.field==="priority"){av=priorityOrder(a.priority);bv=priorityOrder(b.priority);}
      else if(sort.field==="dueDate"){av=a.dueDate||"9999";bv=b.dueDate||"9999";}
      else if(sort.field==="duration"){av=durToMins(a);bv=durToMins(b);}
      else if(sort.field==="recurrence"){av=recToDays(a);bv=recToDays(b);}
      if(av<bv)return sort.dir==="asc"?-1:1;
      if(av>bv)return sort.dir==="asc"?1:-1;
      return 0;
    });
  },[tasks,sort]);

  const groups=board?.groups||[];
  const [addingGroup,setAddingGroup]=useState(false);
  const [newGroupName,setNewGroupName]=useState("");

  const addGroup=async()=>{
    console.log("addGroup called, newGroupName:", newGroupName, "board:", board?.id);
    const name=newGroupName.trim();
    if(!name){console.log("empty name, returning");return;}
    if(!board?.id){console.log("no board id");return;}
    const id=genId();
    const color=GROUP_COLORS[(groups||[]).length%GROUP_COLORS.length];
    const newGroups=[...(groups||[]),{id,label:name,color}];
    console.log("saving newGroups:", newGroups);
    try{
      await db.collection("boards").doc(board.id).set({groups:newGroups},{merge:true});
      selectBoard({...board,groups:newGroups});
      setAddingGroup(false);
      setNewGroupName("");
      console.log("addGroup success");
    }catch(e){
      console.error("addGroup error:",e);
      alert("Error: "+e.message);
    }
  };

  const deleteGroup=async(groupId)=>{
    const newGroups=groups.filter(g=>g.id!==groupId);
    await db.collection("boards").doc(board.id).set({groups:newGroups},{merge:true});
    selectBoard({...board,groups:newGroups});
    // Delete tasks in that group
    const groupTasks=tasks.filter(t=>t.group===groupId);
    if(groupTasks.length>0){
      const batch=db.batch();
      groupTasks.forEach(t=>batch.delete(tasksRef(board.id).doc(t.id)));
      await batch.commit();
    }
  };

  const renameGroup=async(groupId,newLabel)=>{
    const newGroups=groups.map(g=>g.id===groupId?{...g,label:newLabel}:g);
    await db.collection("boards").doc(board.id).set({groups:newGroups},{merge:true});
    selectBoard({...board,groups:newGroups});
  };

  const saveBoardNameApp=async(newName)=>{
    if(!newName.trim()||newName===board.name)return;
    await db.collection("boards").doc(board.id).set({name:newName.trim()},{merge:true});
    selectBoard({...board,name:newName.trim()});
  };

  const filtered=useMemo(()=>{
    const today=new Date();today.setHours(0,0,0,0);
    return sorted.filter(t=>{
      const uid=t.assignee;
      const vis=!activeUserId||activeUserId===uid||members.length<=1;
      // In shared board show all unless filtered by user
      if(search&&!t.name.toLowerCase().includes(search.toLowerCase()))return false;
      if(filter==="today"){if(!t.dueDate||t.status==="Done")return false;const d=parseTaskDate(t.dueDate);const dDay=new Date(d);dDay.setHours(0,0,0,0);return dDay<=today;}
      if(filter==="overdue"){if(!t.dueDate||t.status==="Done")return false;const d=parseTaskDate(t.dueDate);const dDay=new Date(d);dDay.setHours(0,0,0,0);return dDay<today;}
      return true;
    });
  },[sorted,activeUserId,search,filter,members]);

  const doneCount=useMemo(()=>tasks.filter(t=>t.status==="Done").length,[tasks]);
  const todayCount=useMemo(()=>{const today=new Date();today.setHours(0,0,0,0);return tasks.filter(t=>{if(!t.dueDate||t.status==="Done")return false;const d=parseTaskDate(t.dueDate);const dDay=new Date(d);dDay.setHours(0,0,0,0);return dDay<=today;}).length;},[tasks]);
  const overdueCount=useMemo(()=>{const today=new Date();today.setHours(0,0,0,0);return tasks.filter(t=>{if(!t.dueDate||t.status==="Done")return false;const d=parseTaskDate(t.dueDate);const dDay=new Date(d);dDay.setHours(0,0,0,0);return dDay<today;}).length;},[tasks]);
  const showWho=members.length>1;
  const isMob=window.innerWidth<=700;

  // Loading
  if(authUser===undefined)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#676879",fontSize:15}}>Loading…</div>;
  // Not logged in
  if(!authUser)return<AuthScreen/>;
  // No board selected
  if(!board)return<BoardSelector user={authUser} onSelect={selectBoard}/>;

  return(
    <div style={{minHeight:"100vh",background:"#f5f6f8"}}>
      <FloatingMenu menu={menu} onClose={closeMenu}/>
      <GlobalPopover/>

      {/* Top bar */}
      <div className="top-bar" style={{background:"#fff",borderBottom:"1px solid #e6e9ef",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",position:"sticky",top:0,zIndex:100}}>
        <button onClick={()=>selectBoard(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#676879",fontSize:13,display:"flex",alignItems:"center",gap:4,fontFamily:"inherit",padding:0}}>
          <span style={{fontSize:16}}>‹</span>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:26,height:26,borderRadius:6,background:"linear-gradient(135deg,#0073ea,#9b59b6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.3"/></svg>
          </div>
          <span style={{fontWeight:700,fontSize:15,color:"#323338"}}>{board.name}</span>
        </div>
        <span className={`sync-dot${syncing?" syncing":""}`} title={syncing?"Syncing…":"Synced"}/>
        {/* Member switcher */}
        {members.length>1&&(
          <div style={{display:"flex",alignItems:"center",gap:3,background:"#f5f6f8",borderRadius:24,padding:3,border:"1px solid #e6e9ef",marginLeft:"auto"}}>
            <button className="user-btn" onClick={()=>setActiveUserId(null)}
              style={{background:!activeUserId?"#0073ea":"transparent",color:!activeUserId?"#fff":"#676879",fontSize:11,padding:"5px 10px"}}>
              All
            </button>
            {members.map(m=>{const u=resolveUser(m.uid,members);return(
              <button key={m.uid} className="user-btn" onClick={()=>setActiveUserId(m.uid)}
                style={{background:activeUserId===m.uid?u.color:"transparent",color:activeUserId===m.uid?"#fff":"#676879",boxShadow:activeUserId===m.uid?`0 2px 8px ${u.color}44`:"none",padding:"5px 8px"}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:activeUserId===m.uid?"rgba(255,255,255,0.25)":u.color+"22",color:activeUserId===m.uid?"#fff":u.color,fontSize:8,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{u.initials}</div>
                <span className="user-label">{u.label.split(" ")[0]}</span>
              </button>
            );})}
          </div>
        )}
        <div style={{display:"flex",gap:6,marginLeft:members.length<=1?"auto":"0"}}>
          <button onClick={()=>setShowBoardSettings(true)}
            style={{background:"#0073ea",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
            <span>+</span> Invite
          </button>
          <button onClick={()=>setShowActivity(true)} title="Activity log"
            style={{background:"none",border:"1px solid #e6e9ef",borderRadius:6,padding:"5px 10px",fontFamily:"inherit",fontSize:12,color:"#676879",cursor:"pointer"}}>📋</button>
          <button onClick={()=>setShowBoardSettings(true)} title="Board settings"
            style={{background:"none",border:"1px solid #e6e9ef",borderRadius:6,padding:"5px 10px",fontFamily:"inherit",fontSize:12,color:"#676879",cursor:"pointer"}}>⚙️</button>
          <button onClick={()=>setShowProfile(true)} title="Profile"
            style={{background:"none",border:"1px solid #e6e9ef",borderRadius:6,padding:"5px 10px",fontFamily:"inherit",fontSize:12,color:"#676879",cursor:"pointer"}}>👤</button>
          <button onClick={()=>auth.signOut()}
            style={{background:"none",border:"1px solid #e6e9ef",borderRadius:6,padding:"5px 10px",fontFamily:"inherit",fontSize:11,color:"#676879",cursor:"pointer"}}>Sign out</button>
        </div>
      </div>

      {/* Nav tabs */}
      <div style={{background:"#fff",borderBottom:"1px solid #e6e9ef",display:"flex",alignItems:"center",padding:"0 16px",gap:0,overflowX:"auto"}}>
        <button className={`nav-tab${filter==="all"?" active":""}`} onClick={()=>setFilter("all")}>All</button>
        <button className={`nav-tab${filter==="today"?" active":""}`} onClick={()=>setFilter("today")}>
          Due Today {todayCount>0&&<span style={{background:"#fdab3d",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11,fontWeight:700,marginLeft:4}}>{todayCount}</span>}
        </button>
        <button className={`nav-tab${filter==="overdue"?" active":""}`} onClick={()=>setFilter("overdue")}>
          Overdue {overdueCount>0&&<span style={{background:"#e2445c",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:11,fontWeight:700,marginLeft:4}}>{overdueCount}</span>}
        </button>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,padding:"6px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:7,background:"#f5f6f8",border:"1.5px solid #e6e9ef",borderRadius:6,padding:"5px 10px"}}>
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#c5c7d4" strokeWidth="1.5"/><path d="M10 10l2.5 2.5" stroke="#c5c7d4" strokeWidth="1.5" strokeLinecap="round"/></svg>
            <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}
              style={{border:"none",outline:"none",fontFamily:"inherit",fontSize:13,color:"#323338",background:"transparent",width:100}}/>
          </div>
          <button onClick={()=>exportCSV(tasks,members)} title="Export CSV"
            style={{background:"none",border:"1px solid #e6e9ef",borderRadius:6,padding:"5px 10px",fontFamily:"inherit",fontSize:12,color:"#676879",cursor:"pointer"}}>↓ CSV</button>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:70,height:5,background:"#e6e9ef",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",background:"#00c875",borderRadius:3,transition:"width 0.4s",width:tasks.length?`${(doneCount/tasks.length)*100}%`:"0%"}}/>
            </div>
            <span style={{fontSize:12,color:"#676879",fontWeight:500,whiteSpace:"nowrap"}}>{doneCount}/{tasks.length}</span>
          </div>
        </div>
      </div>

      {/* Groups */}
      <div className="groups-wrap" style={{padding:"0 0 28px"}}>
        {filter!=="all"&&filtered.length===0&&(
          <div className="empty-state" style={{padding:80}}>
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#c5c7d4" strokeWidth="2"/><path d="M22 32l7 7 13-13" stroke="#00c875" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            <span style={{fontSize:16,fontWeight:600,color:"#676879"}}>All caught up!</span>
            <span style={{fontSize:13,color:"#c5c7d4"}}>{filter==="today"?"No tasks due today.":"No overdue tasks."}</span>
          </div>
        )}
        {groups.map(g=>(
          <GroupSection key={g.id} group={g} tasks={filtered} openMenu={openMenu}
            onUpdate={updateTask} onDelete={deleteTask} dragState={drag}
            onDragStart={onDragStart} onDragEnter={onDragEnter} onDragEnd={onDragEnd}
            onDropEmpty={onDropEmpty} onAddTask={addTask} sort={sort} onSort={onSort}
            cols={cols} onResize={onResize} showWho={showWho} filter={filter} members={members}
            onDeleteGroup={deleteGroup} onRenameGroup={renameGroup}
            newTask={newTask} onCommitNewTask={commitNewTask} onCancelNewTask={()=>setNewTask(null)}
            onUpdateNewTask={(f,v)=>setNewTask(t=>({...t,[f]:v}))}/>
        ))}
        {/* Add group */}
        {filter==="all"&&<div style={{padding:"8px 16px 16px"}}>
          {addingGroup?(
            <div style={{background:"#fff",border:"1.5px solid #0073ea",borderRadius:10,padding:"12px 14px",display:"flex",gap:8,alignItems:"center"}}>
              <div style={{width:11,height:11,borderRadius:"50%",background:GROUP_COLORS[groups.length%GROUP_COLORS.length],flexShrink:0}}/>
              <input autoFocus placeholder="Group name…" value={newGroupName} onChange={e=>setNewGroupName(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")addGroup();if(e.key==="Escape"){setAddingGroup(false);setNewGroupName("");}}}
                style={{flex:1,border:"none",outline:"none",fontFamily:"inherit",fontSize:14,fontWeight:600,color:"#323338",background:"transparent"}}/>
              <button onClick={addGroup} style={{background:"#0073ea",color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
              <button onClick={()=>{setAddingGroup(false);setNewGroupName("");}} style={{background:"none",border:"none",color:"#c5c7d4",fontSize:20,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button>
            </div>
          ):(
            <button onClick={()=>setAddingGroup(true)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"none",border:"2px dashed #e6e9ef",borderRadius:10,fontFamily:"inherit",fontSize:13,fontWeight:600,color:"#676879",cursor:"pointer",width:"100%",transition:"border-color 0.15s,color 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#0073ea";e.currentTarget.style.color="#0073ea";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#e6e9ef";e.currentTarget.style.color="#676879";}}>
              <span style={{fontSize:18,lineHeight:1}}>+</span> Add group
            </button>
          )}
        </div>}
      </div>

      {isMob&&<AddModal newTask={newTask} onSave={commitNewTask} onCancel={()=>setNewTask(null)}
        onUpdateNew={(f,v)=>setNewTask(t=>({...t,[f]:v}))} openMenu={openMenu} members={members} groups={groups}/>}

      {toast&&<div className="toast">{toast}</div>}

      {showProfile&&<ProfileModal user={authUser} members={members} boardId={board?.id} onClose={()=>setShowProfile(false)}/>}
      {showBoardSettings&&<BoardSettingsModal board={board} members={members} user={authUser} onClose={()=>setShowBoardSettings(false)}
        onSaveBoardName={saveBoardNameApp}
        onBoardUpdate={b=>selectBoard(b)}
        onLeave={async()=>{
          if(!confirm("Leave this board?"))return;
          await membersRef(board.id).doc(authUser.uid).delete();
          await db.collection("userBoards").doc(authUser.uid).update({boardIds:firebase.firestore.FieldValue.arrayRemove(board.id)});
          selectBoard(null);setShowBoardSettings(false);
        }}/>}
      {showActivity&&<ActivityPanel boardId={board.id} members={members} onClose={()=>setShowActivity(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
const SW=`const CACHE='docket-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['/'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.mode==='navigate')e.respondWith(fetch(e.request).catch(()=>caches.match('/')));});`;
if('serviceWorker'in navigator){const b=new Blob([SW],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b),{scope:'/'}).catch(()=>{});}
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('ib').style.display='flex';});
function doI(){if(!dp)return;document.getElementById('ib').style.display='none';dp.prompt();dp=null;}
function doD(){document.getElementById('ib').style.display='none';}
window.addEventListener('appinstalled',()=>{document.getElementById('ib').style.display='none';});
</script>
<div id="ib" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999999;align-items:center;justify-content:center;background:rgba(0,0,0,0.5)">
  <div style="background:#fff;border-radius:16px;padding:28px 24px;margin:24px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;font-family:'Figtree',sans-serif">
    <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0073ea,#9b59b6);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
      <svg width="32" height="32" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity="0.6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity="0.3"/></svg>
    </div>
    <div style="font-weight:700;font-size:20px;color:#323338;margin-bottom:8px">Install Docket</div>
    <div style="font-size:14px;color:#676879;margin-bottom:24px;line-height:1.5">Add to your home screen for instant access.</div>
    <button onclick="doI()" style="display:block;width:100%;background:#0073ea;color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Figtree',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px">Install App</button>
    <button onclick="doD()" style="display:block;width:100%;background:none;border:none;color:#676879;font-family:'Figtree',sans-serif;font-size:14px;cursor:pointer;padding:10px">Not now</button>
  </div>
</div>
</body>
</html>
